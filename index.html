<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bat Tank — SPGS Command Center</title>
<meta name="theme-color" content="#08111f" />
<style>
:root{--bg:#07101d;--panel:#0d1a2b;--panel2:#122238;--text:#eef5ff;--muted:#90a4bf;--line:rgba(255,255,255,.12);--blue:#4e8cff;--green:#24d18b;--red:#ff5b6e;--yellow:#ffd166;--purple:#a78bfa;--shadow:0 20px 60px rgba(0,0,0,.45)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#14284a 0,#07101d 48%,#050912 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding-bottom:110px}.wrap{max-width:760px;margin:auto;padding:18px}.hero{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.94),rgba(8,17,31,.94));border-radius:22px;box-shadow:var(--shadow)}.kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}.hero h1{margin:4px 0 0;font-size:30px;letter-spacing:-.04em}.badge{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,#4e8cff,#ff334f);display:grid;place-items:center;font-weight:1000;box-shadow:0 0 28px rgba(78,140,255,.36)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab{border:1px solid var(--line);background:rgba(13,26,43,.72);color:var(--muted);border-radius:999px;padding:11px 10px;font-weight:950}.tab.active{color:white;background:linear-gradient(145deg,#203d66,#13233a);box-shadow:0 0 0 1px rgba(78,140,255,.35) inset}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{border:1px solid var(--line);background:rgba(13,26,43,.78);border-radius:18px;padding:14px}.stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:11px;font-weight:800}.stat b{display:block;font-size:24px;margin-top:4px}.stat.good b{color:var(--green)}.stat.warn b{color:var(--yellow)}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.btn{border:0;border-radius:16px;padding:14px 12px;font-weight:900;color:white;background:var(--panel2);font-size:15px;box-shadow:inset 0 0 0 1px var(--line);cursor:pointer}.btn:active{transform:scale(.97)}.btn.primary{background:linear-gradient(145deg,#4e8cff,#3466d9)}.btn.green{background:linear-gradient(145deg,#24d18b,#119c64)}.btn.yellow{background:linear-gradient(145deg,#ffd166,#d99112);color:#1c1300}.btn.red{background:linear-gradient(145deg,#ff5b6e,#c62b41)}.btn.purple{background:linear-gradient(145deg,#a78bfa,#6d4ed7)}.tools{position:sticky;top:0;z-index:5;margin:12px -18px 12px;padding:12px 18px;background:linear-gradient(180deg,rgba(7,16,29,.98),rgba(7,16,29,.78));backdrop-filter:blur(14px);display:flex;gap:8px}.tools input,.tools select{height:42px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:0 12px;font-size:15px}.tools input{flex:1}.tools select{width:128px}.list{display:grid;gap:10px}.empty{border:1px dashed var(--line);border-radius:22px;padding:28px 18px;text-align:center;color:var(--muted);background:rgba(13,26,43,.5)}.empty h2{color:var(--text);margin:0 0 8px}.card{width:100%;text-align:left;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.96),rgba(10,20,35,.96));color:var(--text);border-radius:20px;padding:15px;box-shadow:0 10px 28px rgba(0,0,0,.25);cursor:pointer}.card:active{transform:scale(.992)}.cardTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-size:18px;font-weight:950;letter-spacing:-.02em}.brand{color:var(--muted);font-size:13px;font-weight:800;margin-top:2px}.price{font-size:20px;font-weight:1000;color:#fff;text-align:right}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.04)}.status{color:white;font-weight:900}.sold .status{background:rgba(255,91,110,.22);color:#ff9aa5}.listed .status,.open .status{background:rgba(36,209,139,.18);color:#65efb6}.pending .status{background:rgba(255,209,102,.18);color:#ffe0a0}.closed .status{background:rgba(167,139,250,.18);color:#d6caff}.profit{margin-top:10px;font-size:13px;color:var(--muted)}.profit b{color:var(--green)}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:10px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#24d18b,#4e8cff);border-radius:999px}.fab{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:10;border:0;border-radius:999px;background:linear-gradient(145deg,#4e8cff,#3466d9);color:white;padding:15px 24px;font-size:16px;font-weight:1000;box-shadow:0 12px 38px rgba(0,0,0,.55),0 0 28px rgba(78,140,255,.45);cursor:pointer}.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;display:none}.scrim.open{display:block}.modal{position:fixed;left:50%;bottom:0;transform:translate(-50%,110%);z-index:30;width:min(760px,100%);max-height:92vh;overflow:auto;background:#0b1727;border:1px solid var(--line);border-radius:24px 24px 0 0;box-shadow:var(--shadow);transition:transform .22s ease}.modal.open{transform:translate(-50%,0)}.modalHead{position:sticky;top:0;background:#0b1727;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:14px 18px}.modal h2{margin:0;font-size:19px}.close{background:transparent;color:var(--muted);border:0;font-size:30px;line-height:1;cursor:pointer}.form{padding:16px 18px 24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{margin-bottom:12px}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:12px;font-size:16px}.field textarea{min-height:78px;resize:vertical}.formActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.formActions .btn{flex:1 1 130px}.danger{background:transparent!important;color:var(--red)!important;border:1px solid rgba(255,91,110,.4)!important}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(12px);z-index:50;background:#13233a;border:1px solid var(--line);border-radius:14px;padding:11px 15px;color:var(--text);opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}details{margin-top:18px;border:1px solid var(--line);border-radius:18px;background:rgba(13,26,43,.65)}summary{padding:13px 15px;color:var(--muted);font-weight:900;text-transform:uppercase;font-size:12px;letter-spacing:.1em}.backupBody{padding:0 15px 15px}.backupBody textarea{width:100%;min-height:110px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px}.section{display:none}.section.active{display:block}@media(max-width:430px){.hero h1{font-size:26px}.grid{grid-template-columns:1fr}.stats,.actions{grid-template-columns:1fr 1fr}.btn{font-size:14px;padding:13px 9px}.tabs{gap:6px}.tab{font-size:13px;padding:10px 6px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero"><div><div class="kicker">Slowpitch Gas Station</div><h1>Bat Tank</h1></div><div class="badge">SPGS</div></section>
  <nav class="tabs">
    <button class="tab active" data-view="inventory">Inventory</button>
    <button class="tab" data-view="raffles">Raffles</button>
    <button class="tab" data-view="expenses">Expenses</button>
  </nav>

  <section class="stats">
    <div class="stat"><small>In stock</small><b id="statStock">0</b></div>
    <div class="stat"><small>Asking total</small><b id="statAsk">$0</b></div>
    <div class="stat good"><small>Net profit</small><b id="statProfit">$0</b></div>
    <div class="stat warn"><small>MTD spent</small><b id="statSpent">$0</b></div>
  </section>

  <section class="actions">
    <button class="btn primary" id="quickAdd">+ Add Bat</button>
    <button class="btn purple" id="quickRaffle">+ Raffle</button>
    <button class="btn yellow" id="quickExpense">+ Expense</button>
    <button class="btn green" id="quickSold">Log Sold</button>
  </section>

  <section id="inventory" class="section active">
    <div class="tools"><input id="search" placeholder="Search bats…"><select id="sort"><option value="recent">Recent</option><option value="brand">Brand</option><option value="price">Price</option><option value="weight">Weight</option></select></div>
    <main class="list" id="batList"></main>
  </section>

  <section id="raffles" class="section">
    <main class="list" id="raffleList"></main>
  </section>

  <section id="expenses" class="section">
    <main class="list" id="expenseList"></main>
  </section>

  <details><summary>Backup & Restore</summary><div class="backupBody"><textarea id="backupBox"></textarea><div class="actions"><button class="btn" id="copyBackup">Copy Backup</button><button class="btn" id="restoreBackup">Restore Paste</button></div></div></details>
</div>
<button class="fab" id="fab">+ Add bat</button>
<div class="scrim" id="scrim"></div>

<section class="modal" id="batModal" role="dialog" aria-modal="true">
  <div class="modalHead"><h2 id="batModalTitle">Add bat</h2><button class="close" data-close aria-label="Close">×</button></div>
  <form class="form" id="batForm">
    <input type="hidden" id="id">
    <div class="grid"><div class="field"><label>Brand *</label><input id="brand" required placeholder="Anarchy"></div><div class="field"><label>Model</label><input id="model" placeholder="America"></div></div>
    <div class="grid"><div class="field"><label>Weight</label><input id="weight" inputmode="decimal" placeholder="25"></div><div class="field"><label>Association</label><select id="cert"><option>ASA/USA</option><option>USSSA</option><option>Senior</option><option>NSA</option><option>ISA</option><option></option></select></div></div>
    <div class="grid"><div class="field"><label>Condition</label><select id="condition"><option>New</option><option>NIW</option><option>Mint</option><option>Used</option></select></div><div class="field"><label>Status</label><select id="status"><option value="instock">In Stock</option><option value="listed">Listed</option><option value="pending">Pending</option><option value="sold">Sold</option></select></div></div>
    <div class="grid"><div class="field"><label>Cost $</label><input id="cost" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Asking $</label><input id="ask" type="number" inputmode="decimal" step="0.01"></div></div>
    <div class="grid"><div class="field"><label>Sold For $</label><input id="sold" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Shipping $</label><input id="shipping" type="number" inputmode="decimal" step="0.01"></div></div>
    <div class="grid"><div class="field"><label>Fees $</label><input id="fees" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Acquired</label><input id="acquired" type="date"></div></div>
    <div class="field"><label>Notes</label><textarea id="notes" placeholder="Source, buyer, raffle info, tracking, etc."></textarea></div>
    <div class="formActions"><button class="btn primary" type="submit">Save Bat</button><button class="btn" type="button" id="copyPost">Copy Post</button><button class="btn danger" type="button" id="deleteBat">Delete</button></div>
  </form>
</section>

<section class="modal" id="expenseModal" role="dialog" aria-modal="true">
  <div class="modalHead"><h2 id="expenseModalTitle">Log expense</h2><button class="close" data-close aria-label="Close">×</button></div>
  <form class="form" id="expenseForm">
    <input type="hidden" id="expenseId">
    <div class="grid"><div class="field"><label>Where / Source *</label><input id="expenseSource" required placeholder="SEB, CenTex, BatCave"></div><div class="field"><label>Amount $ *</label><input id="expenseAmount" type="number" inputmode="decimal" step="0.01" required></div></div>
    <div class="grid"><div class="field"><label>Category</label><select id="expenseCategory"><option>Raffle Entry</option><option>Inventory</option><option>Shipping Supplies</option><option>Shipping</option><option>Fees</option><option>Other</option></select></div><div class="field"><label>Date</label><input id="expenseDate" type="date"></div></div>
    <div class="field"><label>Notes</label><textarea id="expenseNotes" placeholder="What it was for, prize won, etc."></textarea></div>
    <div class="formActions"><button class="btn yellow" type="submit">Save Expense</button><button class="btn danger" type="button" id="deleteExpense">Delete</button></div>
  </form>
</section>

<section class="modal" id="raffleModal" role="dialog" aria-modal="true">
  <div class="modalHead"><h2 id="raffleModalTitle">Add raffle</h2><button class="close" data-close aria-label="Close">×</button></div>
  <form class="form" id="raffleForm">
    <input type="hidden" id="raffleId">
    <div class="grid"><div class="field"><label>Raffle Name *</label><input id="raffleName" required placeholder="9x35 Winner Choice"></div><div class="field"><label>Status</label><select id="raffleStatus"><option value="open">Open</option><option value="pending">Pending Winner Pick</option><option value="closed">Closed</option></select></div></div>
    <div class="grid"><div class="field"><label>Spots</label><input id="raffleSpots" type="number" inputmode="numeric" placeholder="9"></div><div class="field"><label>Price / Spot $</label><input id="rafflePrice" type="number" inputmode="decimal" step="0.01" placeholder="35"></div></div>
    <div class="grid"><div class="field"><label>Filled Spots</label><input id="raffleFilled" type="number" inputmode="numeric" placeholder="0"></div><div class="field"><label>Winner</label><input id="raffleWinner" placeholder="Name"></div></div>
    <div class="grid"><div class="field"><label>Prize</label><input id="rafflePrize" placeholder="Anarchy America"></div><div class="field"><label>Shipping $</label><input id="raffleShipping" type="number" inputmode="decimal" step="0.01"></div></div>
    <div class="field"><label>Notes</label><textarea id="raffleNotes" placeholder="Numbers, unpaid spots, winner choice, label info, etc."></textarea></div>
    <div class="formActions"><button class="btn purple" type="submit">Save Raffle</button><button class="btn" type="button" id="copyRaffle">Copy Update</button><button class="btn danger" type="button" id="deleteRaffle">Delete</button></div>
  </form>
</section>

<div class="toast" id="toast"></div>
<script>
(function(){
const KEY='spgs_bat_tank_v2';
const OLDKEY='spgs_bat_tank_fixed_v1';
const $=id=>document.getElementById(id);
let state={bats:[],expenses:[],raffles:[]};
let view='inventory';
const money=n=>'$'+Math.round(Number(n)||0).toLocaleString('en-US');
const num=v=>Number(v)||0;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700)}
function load(){try{let raw=localStorage.getItem(KEY);if(raw){state=JSON.parse(raw)}else{state.bats=JSON.parse(localStorage.getItem(OLDKEY)||'[]')}}catch(e){state={bats:[],expenses:[],raffles:[]}};state.bats ||= [];state.expenses ||= [];state.raffles ||= []}
function save(){localStorage.setItem(KEY,JSON.stringify(state));$('backupBox').value=JSON.stringify(state,null,2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function stats(){let stock=0,ask=0,profit=0;state.bats.forEach(b=>{if(b.status==='sold'){profit+=num(b.sold)-num(b.cost)-num(b.shipping)-num(b.fees)}else{stock++;ask+=num(b.ask)}});state.raffles.forEach(r=>{if(r.status==='closed')profit+=(num(r.filled||r.spots)*num(r.price))-num(r.shipping)});let month=new Date().toISOString().slice(0,7);let spent=state.expenses.filter(e=>(e.date||'').slice(0,7)===month).reduce((a,e)=>a+num(e.amount),0);$('statStock').textContent=stock;$('statAsk').textContent=money(ask);$('statProfit').textContent=money(profit-spent);$('statSpent').textContent=money(spent)}
function setView(v){view=v;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===v));$('fab').textContent=v==='inventory'?'+ Add bat':v==='raffles'?'+ Raffle':'+ Expense';render()}
function render(){stats();save();renderBats();renderExpenses();renderRaffles()}
function label(s){return ({instock:'In Stock',listed:'Listed',pending:'Pending',sold:'Sold',open:'Open',closed:'Closed'})[s]||s||'Open'}
function renderBats(){let q=$('search').value.toLowerCase().trim();let arr=state.bats.filter(b=>(b.brand+' '+b.model+' '+b.cert+' '+b.notes).toLowerCase().includes(q));let sort=$('sort').value;if(sort==='brand')arr.sort((a,b)=>(a.brand+a.model).localeCompare(b.brand+b.model));if(sort==='price')arr.sort((a,b)=>num(b.ask)-num(a.ask));if(sort==='weight')arr.sort((a,b)=>num(b.weight)-num(a.weight));if(sort==='recent')arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));const list=$('batList');if(!arr.length){list.innerHTML='<div class="empty"><h2>No bats found</h2><p>Tap Add Bat to track inventory, sales, shipping, and profit.</p></div>';return}list.innerHTML=arr.map(b=>{let net=num(b.sold)-num(b.cost)-num(b.shipping)-num(b.fees);return `<button class="card ${b.status}" data-bat="${b.id}"><div class="cardTop"><div><div class="title">${esc(b.weight?b.weight+'oz ':'')}${esc(b.brand)} ${esc(b.model)}</div><div class="brand">${esc(b.cert||'ASA/USA')} • ${esc(b.condition||'')}</div></div><div class="price">${b.ask?money(b.ask):''}</div></div><div class="chips"><span class="chip status">${esc(label(b.status))}</span>${b.cost?`<span class="chip">Cost ${money(b.cost)}</span>`:''}${b.sold?`<span class="chip">Sold ${money(b.sold)}</span>`:''}</div>${b.status==='sold'?`<div class="profit">Net profit: <b>${money(net)}</b></div>`:''}</button>`}).join('');document.querySelectorAll('[data-bat]').forEach(c=>c.addEventListener('click',()=>openEditBat(c.dataset.bat)))}
function renderExpenses(){const list=$('expenseList');let arr=[...state.expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||'') || (b.createdAt||0)-(a.createdAt||0));if(!arr.length){list.innerHTML='<div class="empty"><h2>No expenses yet</h2><p>Log raffle entries, shipping supplies, labels, fees, and business spending.</p></div>';return}list.innerHTML=arr.map(e=>`<button class="card" data-expense="${e.id}"><div class="cardTop"><div><div class="title">${esc(e.source)}</div><div class="brand">${esc(e.category)} • ${esc(e.date||'No date')}</div></div><div class="price">${money(e.amount)}</div></div>${e.notes?`<div class="profit">${esc(e.notes)}</div>`:''}</button>`).join('');document.querySelectorAll('[data-expense]').forEach(c=>c.addEventListener('click',()=>openEditExpense(c.dataset.expense)))}
function renderRaffles(){const list=$('raffleList');let arr=[...state.raffles].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));if(!arr.length){list.innerHTML='<div class="empty"><h2>No raffles yet</h2><p>Add a raffle to track spots, intake, winner, prize, and shipping.</p></div>';return}list.innerHTML=arr.map(r=>{let spots=num(r.spots),filled=num(r.filled),pct=spots?Math.min(100,Math.round(filled/spots*100)):0,intake=filled*num(r.price),net=intake-num(r.shipping);return `<button class="card ${r.status}" data-raffle="${r.id}"><div class="cardTop"><div><div class="title">${esc(r.name)}</div><div class="brand">${filled}/${spots||0} spots • ${money(r.price)} each</div></div><div class="price">${money(intake)}</div></div><div class="chips"><span class="chip status">${esc(label(r.status))}</span>${r.winner?`<span class="chip">Winner ${esc(r.winner)}</span>`:''}${r.prize?`<span class="chip">${esc(r.prize)}</span>`:''}</div><div class="bar"><i style="width:${pct}%"></i></div><div class="profit">Estimated net after raffle shipping: <b>${money(net)}</b></div></button>`}).join('');document.querySelectorAll('[data-raffle]').forEach(c=>c.addEventListener('click',()=>openEditRaffle(c.dataset.raffle)))}
function openModal(id,title){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'));$('scrim').classList.add('open');$(id).classList.add('open');let h=$(id).querySelector('h2'); if(h)h.textContent=title}
function closeModal(){$('scrim').classList.remove('open');document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'))}
function clearBat(){['id','brand','model','weight','cost','ask','sold','shipping','fees','acquired','notes'].forEach(id=>$(id).value='');$('cert').value='ASA/USA';$('condition').value='New';$('status').value='instock';$('deleteBat').style.display='none';$('copyPost').style.display='none'}
function openAddBat(status='instock'){clearBat();$('status').value=status;openModal('batModal',status==='sold'?'Log sold bat':'Add bat')}
function openEditBat(id){let b=state.bats.find(x=>x.id===id);if(!b)return;clearBat();Object.keys(b).forEach(k=>{if($(k))$(k).value=b[k]||''});$('deleteBat').style.display='';$('copyPost').style.display='';openModal('batModal','Edit bat')}
function collectBat(){return {id:$('id').value||uid(),brand:$('brand').value.trim(),model:$('model').value.trim(),weight:$('weight').value.trim(),cert:$('cert').value,condition:$('condition').value,status:$('status').value,cost:$('cost').value,ask:$('ask').value,sold:$('sold').value,shipping:$('shipping').value,fees:$('fees').value,acquired:$('acquired').value,notes:$('notes').value.trim(),createdAt:$('id').value?(state.bats.find(b=>b.id===$('id').value)?.createdAt||Date.now()):Date.now()}}
function clearExpense(){['expenseId','expenseSource','expenseAmount','expenseNotes'].forEach(id=>$(id).value='');$('expenseCategory').value='Raffle Entry';$('expenseDate').value=today();$('deleteExpense').style.display='none'}
function openAddExpense(){clearExpense();openModal('expenseModal','Log expense')}
function openEditExpense(id){let e=state.expenses.find(x=>x.id===id);if(!e)return;clearExpense();$('expenseId').value=e.id;$('expenseSource').value=e.source||'';$('expenseAmount').value=e.amount||'';$('expenseCategory').value=e.category||'Raffle Entry';$('expenseDate').value=e.date||'';$('expenseNotes').value=e.notes||'';$('deleteExpense').style.display='';openModal('expenseModal','Edit expense')}
function collectExpense(){return {id:$('expenseId').value||uid(),source:$('expenseSource').value.trim(),amount:$('expenseAmount').value,category:$('expenseCategory').value,date:$('expenseDate').value||today(),notes:$('expenseNotes').value.trim(),createdAt:$('expenseId').value?(state.expenses.find(e=>e.id===$('expenseId').value)?.createdAt||Date.now()):Date.now()}}
function clearRaffle(){['raffleId','raffleName','raffleSpots','rafflePrice','raffleFilled','raffleWinner','rafflePrize','raffleShipping','raffleNotes'].forEach(id=>$(id).value='');$('raffleStatus').value='open';$('deleteRaffle').style.display='none';$('copyRaffle').style.display='none'}
function openAddRaffle(){clearRaffle();openModal('raffleModal','Add raffle')}
function openEditRaffle(id){let r=state.raffles.find(x=>x.id===id);if(!r)return;clearRaffle();$('raffleId').value=r.id;$('raffleName').value=r.name||'';$('raffleStatus').value=r.status||'open';$('raffleSpots').value=r.spots||'';$('rafflePrice').value=r.price||'';$('raffleFilled').value=r.filled||'';$('raffleWinner').value=r.winner||'';$('rafflePrize').value=r.prize||'';$('raffleShipping').value=r.shipping||'';$('raffleNotes').value=r.notes||'';$('deleteRaffle').style.display='';$('copyRaffle').style.display='';openModal('raffleModal','Edit raffle')}
function collectRaffle(){return {id:$('raffleId').value||uid(),name:$('raffleName').value.trim(),status:$('raffleStatus').value,spots:$('raffleSpots').value,price:$('rafflePrice').value,filled:$('raffleFilled').value,winner:$('raffleWinner').value.trim(),prize:$('rafflePrize').value.trim(),shipping:$('raffleShipping').value,notes:$('raffleNotes').value.trim(),createdAt:$('raffleId').value?(state.raffles.find(r=>r.id===$('raffleId').value)?.createdAt||Date.now()):Date.now()}}
function postText(){let b=collectBat();let line=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ');return `⛽ ${line}\n${b.cert||'ASA/USA'} • ${b.condition||''}\n${b.ask?'💰 '+money(b.ask):''}\n${b.notes?'📝 '+b.notes:''}\n— SPGS`;}
function raffleText(){let r=collectRaffle();return `🎰 ${r.name}\n${r.filled||0}/${r.spots||0} spots filled @ ${money(r.price)}\n${r.prize?'🏆 Prize: '+r.prize+'\n':''}${r.winner?'👑 Winner: '+r.winner+'\n':''}${r.notes?'📝 '+r.notes+'\n':''}— SPGS`;}
$('batForm').addEventListener('submit',e=>{e.preventDefault();let b=collectBat();if(!b.brand){toast('Brand is required');return}let i=state.bats.findIndex(x=>x.id===b.id);if(i>-1)state.bats[i]=b;else state.bats.push(b);closeModal();render();toast('Bat saved')});
$('expenseForm').addEventListener('submit',e=>{e.preventDefault();let x=collectExpense();if(!x.source||!num(x.amount)){toast('Source and amount required');return}let i=state.expenses.findIndex(e=>e.id===x.id);if(i>-1)state.expenses[i]=x;else state.expenses.push(x);closeModal();render();toast('Expense saved')});
$('raffleForm').addEventListener('submit',e=>{e.preventDefault();let r=collectRaffle();if(!r.name){toast('Raffle name required');return}let i=state.raffles.findIndex(x=>x.id===r.id);if(i>-1)state.raffles[i]=r;else state.raffles.push(r);closeModal();render();toast('Raffle saved')});
$('deleteBat').addEventListener('click',()=>{let id=$('id').value;state.bats=state.bats.filter(b=>b.id!==id);closeModal();render();toast('Deleted')});
$('deleteExpense').addEventListener('click',()=>{let id=$('expenseId').value;state.expenses=state.expenses.filter(e=>e.id!==id);closeModal();render();toast('Deleted')});
$('deleteRaffle').addEventListener('click',()=>{let id=$('raffleId').value;state.raffles=state.raffles.filter(r=>r.id!==id);closeModal();render();toast('Deleted')});
$('copyPost').addEventListener('click',()=>navigator.clipboard?navigator.clipboard.writeText(postText()).then(()=>toast('Listing copied')):toast('Clipboard unavailable'));
$('copyRaffle').addEventListener('click',()=>navigator.clipboard?navigator.clipboard.writeText(raffleText()).then(()=>toast('Raffle update copied')):toast('Clipboard unavailable'));
$('quickAdd').addEventListener('click',()=>openAddBat());$('quickSold').addEventListener('click',()=>openAddBat('sold'));$('quickExpense').addEventListener('click',()=>openAddExpense());$('quickRaffle').addEventListener('click',()=>openAddRaffle());
$('fab').addEventListener('click',()=>{if(view==='inventory')openAddBat();else if(view==='raffles')openAddRaffle();else openAddExpense()});
$('scrim').addEventListener('click',closeModal);document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',closeModal));document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>setView(t.dataset.view)));
$('search').addEventListener('input',render);$('sort').addEventListener('change',render);
$('copyBackup').addEventListener('click',()=>navigator.clipboard?navigator.clipboard.writeText($('backupBox').value).then(()=>toast('Backup copied')):toast('Clipboard unavailable'));
$('restoreBackup').addEventListener('click',()=>{try{let data=JSON.parse($('backupBox').value);if(Array.isArray(data))data={bats:data,expenses:[],raffles:[]};if(!data.bats||!data.expenses||!data.raffles)throw Error();state=data;render();toast('Restored')}catch(e){toast('Invalid backup text')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
load();render();
})();
</script>
</body>
</html>
