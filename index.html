<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bat Tank v4 — SPGS Command Center</title>
<meta name="theme-color" content="#07101d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
:root{--bg:#07101d;--panel:#0d1a2b;--panel2:#122238;--text:#eef5ff;--muted:#91a7c3;--line:rgba(255,255,255,.12);--blue:#4e8cff;--green:#24d18b;--red:#ff5b6e;--yellow:#ffd166;--purple:#a78bfa;--orange:#ff9f43;--shadow:0 20px 60px rgba(0,0,0,.45)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#17325b 0,#07101d 43%,#050912 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding-bottom:120px}.wrap{max-width:820px;margin:auto;padding:16px}.hero{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.96),rgba(8,17,31,.94));border-radius:24px;box-shadow:var(--shadow)}.kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:850}.hero h1{margin:4px 0 0;font-size:31px;letter-spacing:-.05em}.badge{width:62px;height:62px;border-radius:21px;background:linear-gradient(145deg,#4e8cff,#ff334f);display:grid;place-items:center;font-weight:1000;box-shadow:0 0 28px rgba(78,140,255,.42)}
.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin:14px 0}.tab{border:1px solid var(--line);background:rgba(13,26,43,.72);color:var(--muted);border-radius:999px;padding:10px 6px;font-weight:950;font-size:13px}.tab.active{color:white;background:linear-gradient(145deg,#203d66,#13233a);box-shadow:0 0 0 1px rgba(78,140,255,.35) inset}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{border:1px solid var(--line);background:rgba(13,26,43,.78);border-radius:18px;padding:14px}.stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:11px;font-weight:850}.stat b{display:block;font-size:23px;margin-top:4px}.stat.good b{color:var(--green)}.stat.warn b{color:var(--yellow)}.stat.bad b{color:var(--red)}.quickbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0}.qbtn{border:1px solid var(--line);border-radius:18px;padding:11px 5px;background:rgba(18,34,56,.78);color:#fff;font-weight:950;font-size:12px}.qbtn span{display:block;font-size:20px;margin-bottom:2px}.btn{border:0;border-radius:16px;padding:14px 12px;font-weight:950;color:white;background:var(--panel2);font-size:15px;box-shadow:inset 0 0 0 1px var(--line);cursor:pointer}.btn:active,.qbtn:active,.tab:active{transform:scale(.97)}.btn.primary{background:linear-gradient(145deg,#4e8cff,#3466d9)}.btn.green{background:linear-gradient(145deg,#24d18b,#119c64)}.btn.yellow{background:linear-gradient(145deg,#ffd166,#d99112);color:#1c1300}.btn.red{background:linear-gradient(145deg,#ff5b6e,#c62b41)}.btn.purple{background:linear-gradient(145deg,#a78bfa,#6d4ed7)}.btn.orange{background:linear-gradient(145deg,#ff9f43,#db6d16)}
.tools{position:sticky;top:0;z-index:5;margin:12px -16px 12px;padding:12px 16px;background:linear-gradient(180deg,rgba(7,16,29,.98),rgba(7,16,29,.78));backdrop-filter:blur(14px);display:flex;gap:8px}.tools input,.tools select{height:42px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:0 12px;font-size:15px}.tools input{flex:1}.tools select{width:126px}.section{display:none}.section.active{display:block}.list{display:grid;gap:10px}.empty{border:1px dashed var(--line);border-radius:22px;padding:28px 18px;text-align:center;color:var(--muted);background:rgba(13,26,43,.5)}.empty h2{color:var(--text);margin:0 0 8px}.card{width:100%;text-align:left;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.96),rgba(10,20,35,.96));color:var(--text);border-radius:20px;padding:15px;box-shadow:0 10px 28px rgba(0,0,0,.25);cursor:pointer}.card.pinned{border-color:rgba(255,209,102,.45);box-shadow:0 10px 32px rgba(255,209,102,.08)}.cardTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-size:18px;font-weight:1000;letter-spacing:-.02em}.brand{color:var(--muted);font-size:13px;font-weight:800;margin-top:2px}.price{font-size:20px;font-weight:1000;color:#fff;text-align:right}.thumb{width:64px;height:64px;border-radius:16px;object-fit:cover;background:rgba(255,255,255,.06);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);font-weight:1000}.mediaRow{display:flex;gap:8px;overflow:auto;margin-top:10px}.mediaRow img{width:88px;height:88px;object-fit:cover;border-radius:16px;border:1px solid var(--line)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.04)}.status{color:white;font-weight:900}.sold .status{background:rgba(255,91,110,.22);color:#ff9aa5}.listed .status,.open .status{background:rgba(36,209,139,.18);color:#65efb6}.pending .status,.todo .status,.packed .status{background:rgba(255,209,102,.18);color:#ffe0a0}.closed .status,.shipped .status{background:rgba(167,139,250,.18);color:#d6caff}.delivered .status{background:rgba(36,209,139,.18);color:#65efb6}.profit{margin-top:10px;font-size:13px;color:var(--muted)}.profit b{color:var(--green)}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:10px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#24d18b,#4e8cff);border-radius:999px}.miniActions{display:flex;gap:8px;margin-top:12px}.miniActions button{flex:1;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.05);color:var(--text);padding:9px 6px;font-weight:900}.homeGrid{display:grid;gap:10px}.insight{border:1px solid var(--line);background:rgba(13,26,43,.75);border-radius:20px;padding:15px}.insight h3{margin:0 0 6px}.insight p{color:var(--muted);margin:0;line-height:1.35}.chart{height:12px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:10px}.chart i{display:block;height:100%;background:linear-gradient(90deg,#4e8cff,#24d18b)}.row{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding:10px 0}.row:first-child{border-top:0}.row b{color:#fff}.pillrow{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.04);color:var(--muted);font-weight:850;font-size:12px}.fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:10;border:0;border-radius:999px;background:linear-gradient(145deg,#4e8cff,#3466d9);color:white;width:62px;height:62px;font-size:31px;font-weight:900;box-shadow:0 12px 38px rgba(0,0,0,.55),0 0 28px rgba(78,140,255,.45);cursor:pointer}.speedMenu{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:12;display:none;gap:8px;flex-direction:column}.speedMenu.open{display:flex}.speedMenu button{border:1px solid var(--line);border-radius:16px;padding:13px 16px;background:#13233a;color:#fff;font-weight:950;box-shadow:0 10px 28px rgba(0,0,0,.4)}.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;display:none}.scrim.open{display:block}.modal{position:fixed;left:50%;bottom:0;transform:translate(-50%,110%);z-index:30;width:min(820px,100%);max-height:92vh;overflow:auto;background:#0b1727;border:1px solid var(--line);border-radius:24px 24px 0 0;box-shadow:var(--shadow);transition:transform .22s ease}.modal.open{transform:translate(-50%,0)}.modalHead{position:sticky;top:0;background:#0b1727;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:14px 18px}.modal h2{margin:0;font-size:19px}.close{background:transparent;color:var(--muted);border:0;font-size:30px;line-height:1;cursor:pointer}.form{padding:16px 18px 24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{margin-bottom:12px}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:12px;font-size:16px}.field textarea{min-height:78px;resize:vertical}.formActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.formActions .btn{flex:1 1 130px}.danger{background:transparent!important;color:var(--red)!important;border:1px solid rgba(255,91,110,.4)!important}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(12px);z-index:50;background:#13233a;border:1px solid var(--line);border-radius:14px;padding:11px 15px;color:var(--text);opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}details{margin-top:18px;border:1px solid var(--line);border-radius:18px;background:rgba(13,26,43,.65)}summary{padding:13px 15px;color:var(--muted);font-weight:900;text-transform:uppercase;font-size:12px;letter-spacing:.1em}.backupBody{padding:0 15px 15px}.backupBody textarea{width:100%;min-height:110px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px}@media(max-width:590px){.tabs{grid-template-columns:repeat(3,1fr)}.quickbar{grid-template-columns:repeat(5,1fr);gap:6px}.qbtn{font-size:11px;padding:10px 3px}.qbtn span{font-size:18px}.hero h1{font-size:27px}.grid{grid-template-columns:1fr}.stat b{font-size:21px}.tools select{width:108px}.wrap{padding:14px}.thumb{width:56px;height:56px}.tab{font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero"><div><div class="kicker">Slowpitch Gas Station</div><h1>Bat Tank v4</h1></div><div class="badge">SPGS</div></section>
  <nav class="tabs"><button class="tab active" data-view="home">Home</button><button class="tab" data-view="inventory">Bats</button><button class="tab" data-view="raffles">Raffles</button><button class="tab" data-view="expenses">Spend</button><button class="tab" data-view="shipping">Ship</button><button class="tab" data-view="analytics">Stats</button></nav>
  <section class="stats"><div class="stat"><small>In stock</small><b id="statStock">0</b></div><div class="stat"><small>Asking total</small><b id="statAsk">$0</b></div><div class="stat good"><small>Net profit</small><b id="statProfit">$0</b></div><div class="stat warn"><small>MTD spent</small><b id="statSpent">$0</b></div><div class="stat"><small>Open raffles</small><b id="statRaffles">0</b></div><div class="stat bad"><small>To ship</small><b id="statShip">0</b></div></section>
  <section class="quickbar"><button class="qbtn" id="quickBuy"><span>＋</span>Bat</button><button class="qbtn" id="quickSold"><span>💰</span>Sale</button><button class="qbtn" id="quickRaffle"><span>🎰</span>Raffle</button><button class="qbtn" id="quickExpense"><span>💸</span>Spend</button><button class="qbtn" id="quickShip"><span>📦</span>Ship</button></section>
  <div class="tools"><input id="search" placeholder="Global search: bats, buyers, sources, raffles..." /><select id="sort"><option value="recent">Recent</option><option value="pinned">Pinned</option><option value="profit">Profit</option><option value="askHigh">Ask high</option><option value="brand">Brand</option></select></div>
  <section id="home" class="section active"><div class="homeGrid" id="homeList"></div></section>
  <section id="inventory" class="section"><div class="list" id="batList"></div></section>
  <section id="raffles" class="section"><div class="list" id="raffleList"></div></section>
  <section id="expenses" class="section"><div class="list" id="expenseList"></div></section>
  <section id="shipping" class="section"><div class="list" id="shipList"></div></section>
  <section id="analytics" class="section"><div class="list" id="analyticsList"></div></section>
  <details><summary>Backup / Restore</summary><div class="backupBody"><p class="brand">Copy this backup often. Photos are stored as local data and can make backups large.</p><textarea id="backupBox"></textarea><div class="formActions"><button class="btn primary" id="copyBackup">Copy Backup</button><button class="btn" id="restoreBackup">Restore From Box</button></div></div></details>
</div>
<button class="fab" id="fab">＋</button>
<div class="speedMenu" id="speedMenu"><button data-speed="bat">＋ Add Inventory</button><button data-speed="sold">💰 Record Sale</button><button data-speed="raffle">🎰 New Raffle</button><button data-speed="expense">💸 Log Expense</button><button data-speed="shipment">📦 Package Center</button></div>
<div class="scrim" id="scrim"></div>

<section class="modal" id="batModal"><div class="modalHead"><h2>Bat</h2><button class="close" data-close>×</button></div><form class="form" id="batForm"><input type="hidden" id="id" />
  <div class="grid"><div class="field"><label>Brand</label><input id="brand" placeholder="Anarchy" required /></div><div class="field"><label>Model</label><input id="model" placeholder="America" /></div><div class="field"><label>Weight</label><input id="weight" inputmode="decimal" placeholder="25" /></div><div class="field"><label>Association</label><select id="cert"><option>ASA/USA</option><option>USSSA</option><option>Senior</option><option>Other</option></select></div><div class="field"><label>Condition</label><select id="condition"><option>New</option><option>NIW</option><option>Mint</option><option>Used</option><option>Needs work</option></select></div><div class="field"><label>Status</label><select id="status"><option value="instock">In Stock</option><option value="listed">Listed</option><option value="pending">Pending</option><option value="sold">Sold</option></select></div><div class="field"><label>Cost</label><input id="cost" inputmode="decimal" placeholder="220" /></div><div class="field"><label>Ask / Value</label><input id="ask" inputmode="decimal" placeholder="335" /></div><div class="field"><label>Sold Price</label><input id="sold" inputmode="decimal" placeholder="335" /></div><div class="field"><label>Buyer</label><input id="buyer" placeholder="Buyer name" /></div><div class="field"><label>Shipping Cost</label><input id="shippingCost" inputmode="decimal" placeholder="9.93" /></div><div class="field"><label>Payment Fees</label><input id="fees" inputmode="decimal" placeholder="0" /></div><div class="field"><label>Source</label><input id="source" placeholder="SEB / CenTex / personal" /></div><div class="field"><label>Ship Status</label><select id="shipStatus"><option value="none">None</option><option value="todo">To ship</option><option value="packed">Packed</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option></select></div></div>
  <div class="grid"><div class="field"><label>Tracking Number</label><input id="tracking" placeholder="USPS / UPS tracking" /></div><div class="field"><label>Address Note</label><input id="addressNote" placeholder="Saved elsewhere / DM / label made" /></div></div>
  <div class="field"><label>Photos / Proof</label><input id="photos" type="file" accept="image/*" multiple /><div class="mediaRow" id="photoPreview"></div></div>
  <div class="field"><label>Notes / Proof Details</label><textarea id="notes" placeholder="Receipt note, serial/SKU, condition notes, listing details..."></textarea></div>
  <label class="pill"><input type="checkbox" id="pinned" /> Pin this bat</label>
  <div class="formActions"><button class="btn primary" type="submit">Save Bat</button><button class="btn green" type="button" id="copyPost">Copy Listing</button><button class="btn yellow" type="button" id="copyProof">Copy Proof</button><button class="btn" type="button" id="togglePin">Pin/Unpin</button><button class="btn danger" type="button" id="deleteBat">Delete</button></div>
</form></section>

<section class="modal" id="expenseModal"><div class="modalHead"><h2>Expense</h2><button class="close" data-close>×</button></div><form class="form" id="expenseForm"><input type="hidden" id="expenseId" />
  <div class="grid"><div class="field"><label>Source</label><input id="expenseSource" placeholder="SEB / Midwest RAK / BatCave" required /></div><div class="field"><label>Amount</label><input id="expenseAmount" inputmode="decimal" placeholder="35" required /></div><div class="field"><label>Category</label><select id="expenseCategory"><option>Raffle Entry</option><option>Inventory</option><option>Shipping Supplies</option><option>Shipping</option><option>Fees</option><option>Marketing</option><option>Other</option></select></div><div class="field"><label>Date</label><input id="expenseDate" type="date" /></div></div><div class="field"><label>Notes</label><textarea id="expenseNotes"></textarea></div><div class="formActions"><button class="btn primary" type="submit">Save Expense</button><button class="btn danger" type="button" id="deleteExpense">Delete</button></div>
</form></section>

<section class="modal" id="raffleModal"><div class="modalHead"><h2>Raffle</h2><button class="close" data-close>×</button></div><form class="form" id="raffleForm"><input type="hidden" id="raffleId" />
  <div class="grid"><div class="field"><label>Name</label><input id="raffleName" placeholder="9x35 Winner Choice" required /></div><div class="field"><label>Status</label><select id="raffleStatus"><option value="open">Open</option><option value="pending">Pending Prize</option><option value="closed">Closed</option></select></div><div class="field"><label>Spots</label><input id="raffleSpots" inputmode="numeric" placeholder="9" /></div><div class="field"><label>Price / Spot</label><input id="rafflePrice" inputmode="decimal" placeholder="35" /></div><div class="field"><label>Filled</label><input id="raffleFilled" inputmode="numeric" placeholder="0" /></div><div class="field"><label>Winner</label><input id="raffleWinner" placeholder="Winner name" /></div><div class="field"><label>Prize</label><input id="rafflePrize" placeholder="Bat selected" /></div><div class="field"><label>Shipping Cost</label><input id="raffleShipping" inputmode="decimal" placeholder="9.93" /></div></div><div class="field"><label>Notes</label><textarea id="raffleNotes"></textarea></div><div class="formActions"><button class="btn primary" type="submit">Save Raffle</button><button class="btn green" type="button" id="copyRaffle">Copy Update</button><button class="btn orange" type="button" id="drawWinner">Draw Winner</button><button class="btn danger" type="button" id="deleteRaffle">Delete</button></div>
</form></section>

<section class="modal" id="shipModal"><div class="modalHead"><h2>Package Center</h2><button class="close" data-close>×</button></div><div class="form"><div class="list" id="shipModalList"></div></div></section>
<div class="toast" id="toast"></div>
<script>
(()=>{const STORE='spgsBatTankV4',OLD=['spgsBatTankV3','spgsBatTankV2','batTankSpgsFixed'];let state={bats:[],expenses:[],raffles:[]},view='home',editingPhotos=[];const $=id=>document.getElementById(id),money=v=>'$'+(Number(v)||0).toLocaleString(undefined,{maximumFractionDigits:2}),num=v=>Number(String(v??'').replace(/[^0-9.-]/g,''))||0,uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7),today=()=>new Date().toISOString().slice(0,10),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function label(s){return ({instock:'In Stock',listed:'Listed',pending:'Pending',sold:'Sold',open:'Open',closed:'Closed',todo:'To ship',packed:'Packed',shipped:'Shipped',delivered:'Delivered',none:'None'})[s]||s||''}
function toast(msg){let t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function normalize(d){if(Array.isArray(d))d={bats:d,expenses:[],raffles:[]};d=d||{};d.bats=(d.bats||[]).map(b=>({...b,shippingCost:b.shippingCost??b.shipping??'',photos:b.photos||[]}));return {bats:d.bats||[],expenses:d.expenses||[],raffles:d.raffles||[]}}
function load(){let raw=localStorage.getItem(STORE);if(!raw){for(const k of OLD){raw=localStorage.getItem(k);if(raw)break}}try{state=normalize(JSON.parse(raw||'{}'))}catch(e){state={bats:[],expenses:[],raffles:[]}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state));$('backupBox').value=JSON.stringify(state,null,2)}
function netBat(b){return num(b.sold)-num(b.cost)-num(b.shippingCost)-num(b.fees)}function potential(b){return num(b.ask)-num(b.cost)}function raffleNet(r){return num(r.filled)*num(r.price)-num(r.shipping)}function searchText(){return $('search').value.toLowerCase().trim()}
function inMonth(date){let d=date||today();return String(d).slice(0,7)===today().slice(0,7)}
function render(){save();renderStats();renderHome();renderBats();renderRaffles();renderExpenses();renderShip();renderAnalytics()}
function renderStats(){let stock=state.bats.filter(b=>b.status!=='sold'),sold=state.bats.filter(b=>b.status==='sold'),spent=state.expenses.filter(e=>inMonth(e.date)).reduce((a,e)=>a+num(e.amount),0),profit=sold.reduce((a,b)=>a+netBat(b),0)+state.raffles.reduce((a,r)=>a+raffleNet(r),0)-spent;$('statStock').textContent=stock.length;$('statAsk').textContent=money(stock.reduce((a,b)=>a+num(b.ask),0));$('statProfit').textContent=money(profit);$('statSpent').textContent=money(spent);$('statRaffles').textContent=state.raffles.filter(r=>r.status==='open').length;$('statShip').textContent=state.bats.filter(b=>['todo','packed','shipped'].includes(b.shipStatus)).length}
function renderHome(){let ship=state.bats.filter(b=>['todo','packed','shipped'].includes(b.shipStatus)),open=state.raffles.filter(r=>r.status==='open'),needs=state.bats.filter(b=>b.status!=='sold'&&!num(b.ask)),photos=state.bats.filter(b=>(b.photos||[]).length);$('homeList').innerHTML=`<div class="insight"><h3>Today’s Command Center</h3><p>${ship.length} package${ship.length===1?'':'s'} active • ${open.length} open raffle${open.length===1?'':'s'} • ${needs.length} bat${needs.length===1?'':'s'} need pricing • ${photos.length} bat${photos.length===1?'':'s'} have photos/proof.</p></div><div class="insight"><h3>Fastest next move</h3><p>${ship.length?'Update the package queue before anything gets missed.':needs.length?'Add asking prices to your unpriced bats so inventory value is accurate.':open.length?'Update raffle filled spots and copy a Facebook-ready update.':'Add today’s buys, sales, or expenses.'}</p></div><div class="insight"><h3>Proof Mode</h3><p>v4 lets each bat hold photos, proof notes, source, tracking, and listing copy so your business history stays attached to the item.</p></div>`}
function filteredBats(){let q=searchText(),arr=state.bats.filter(b=>!q||JSON.stringify(b).toLowerCase().includes(q));let s=$('sort').value;arr.sort((a,b)=>s==='pinned'?(b.pinned-a.pinned)||((b.createdAt||0)-(a.createdAt||0)):s==='profit'?potential(b)-potential(a):s==='askHigh'?num(b.ask)-num(a.ask):s==='brand'?(a.brand||'').localeCompare(b.brand||''):(b.createdAt||0)-(a.createdAt||0));return arr}
function renderBats(){let list=$('batList'),arr=filteredBats();if(!arr.length){list.innerHTML='<div class="empty"><h2>No bats found</h2><p>Add inventory or clear search.</p></div>';return}list.innerHTML=arr.map(b=>{let title=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ')||'Untitled bat',thumb=(b.photos||[])[0];return `<button class="card ${b.status||'instock'} ${b.pinned?'pinned':''}" data-bat="${b.id}"><div class="cardTop"><div style="display:flex;gap:12px;align-items:flex-start">${thumb?`<img class="thumb" src="${thumb}">`:`<div class="thumb">${b.pinned?'★':'BAT'}</div>`}<div><div class="title">${esc(title)}</div><div class="brand">${esc([b.cert,b.condition,b.source].filter(Boolean).join(' • '))}</div></div></div><div class="price">${money(b.status==='sold'?b.sold:b.ask)}</div></div><div class="chips"><span class="chip status">${esc(label(b.status||'instock'))}</span>${b.pinned?'<span class="chip">Pinned</span>':''}${(b.photos||[]).length?`<span class="chip">📸 ${(b.photos||[]).length}</span>`:''}${b.shipStatus&&b.shipStatus!=='none'?`<span class="chip">📦 ${esc(label(b.shipStatus))}</span>`:''}${b.tracking?'<span class="chip">Tracking</span>':''}</div><div class="profit">${b.status==='sold'?'Net profit':'Potential spread'}: <b>${money(b.status==='sold'?netBat(b):potential(b))}</b></div><div class="miniActions"><button data-act="sold" data-id="${b.id}">Sold</button><button data-act="listed" data-id="${b.id}">Listed</button><button data-act="pin" data-id="${b.id}">${b.pinned?'Unpin':'Pin'}</button></div></button>`}).join('');document.querySelectorAll('[data-bat]').forEach(c=>c.addEventListener('click',e=>{if(e.target.dataset.act)return;openEditBat(c.dataset.bat)}));document.querySelectorAll('[data-act]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();let b=state.bats.find(x=>x.id===btn.dataset.id);if(!b)return;if(btn.dataset.act==='sold'){b.status='sold';b.shipStatus=b.shipStatus==='none'||!b.shipStatus?'todo':b.shipStatus}else if(btn.dataset.act==='listed')b.status='listed';else b.pinned=!b.pinned;render();toast('Updated')}))}
function renderExpenses(){let q=searchText(),arr=state.expenses.filter(e=>!q||JSON.stringify(e).toLowerCase().includes(q)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));$('expenseList').innerHTML=arr.length?arr.map(e=>`<button class="card" data-expense="${e.id}"><div class="cardTop"><div><div class="title">${esc(e.source)}</div><div class="brand">${esc(e.category)} • ${esc(e.date)}</div></div><div class="price">${money(e.amount)}</div></div>${e.notes?`<div class="profit">${esc(e.notes)}</div>`:''}</button>`).join(''):'<div class="empty"><h2>No expenses found</h2><p>Log raffle entries, supplies, shipping, and fees.</p></div>';document.querySelectorAll('[data-expense]').forEach(c=>c.addEventListener('click',()=>openEditExpense(c.dataset.expense)))}
function renderRaffles(){let q=searchText(),arr=state.raffles.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));$('raffleList').innerHTML=arr.length?arr.map(r=>{let spots=num(r.spots),filled=num(r.filled),pct=spots?Math.min(100,Math.round(filled/spots*100)):0,intake=filled*num(r.price);return `<button class="card ${r.status}" data-raffle="${r.id}"><div class="cardTop"><div><div class="title">${esc(r.name)}</div><div class="brand">${filled}/${spots||0} spots • ${money(r.price)} each</div></div><div class="price">${money(intake)}</div></div><div class="chips"><span class="chip status">${esc(label(r.status))}</span>${r.winner?`<span class="chip">Winner ${esc(r.winner)}</span>`:''}${r.prize?`<span class="chip">${esc(r.prize)}</span>`:''}</div><div class="bar"><i style="width:${pct}%"></i></div><div class="profit">Estimated net: <b>${money(raffleNet(r))}</b></div></button>`}).join(''):'<div class="empty"><h2>No raffles found</h2><p>Add a raffle to track spots, intake, winner, prize, and shipping.</p></div>';document.querySelectorAll('[data-raffle]').forEach(c=>c.addEventListener('click',()=>openEditRaffle(c.dataset.raffle)))}
function shipCard(b){let title=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ');return `<div class="card ${b.shipStatus}"><div class="cardTop"><div><div class="title">${esc(b.buyer||'Buyer')}</div><div class="brand">${esc(title)}${b.tracking?' • '+esc(b.tracking):''}</div></div><div class="price">📦</div></div><div class="chips"><span class="chip status">${esc(label(b.shipStatus))}</span>${b.addressNote?`<span class="chip">${esc(b.addressNote)}</span>`:''}</div><div class="miniActions"><button data-ship="packed" data-id="${b.id}">Packed</button><button data-ship="shipped" data-id="${b.id}">Shipped</button><button data-ship="delivered" data-id="${b.id}">Delivered</button></div></div>`}
function renderShip(){let q=searchText(),arr=state.bats.filter(b=>['todo','packed','shipped'].includes(b.shipStatus)&&(!q||JSON.stringify(b).toLowerCase().includes(q)));let html=arr.length?arr.map(shipCard).join(''):'<div class="empty"><h2>No packages</h2><p>Mark a sold bat as To ship to add it here.</p></div>';$('shipList').innerHTML=html;$('shipModalList').innerHTML=html;document.querySelectorAll('[data-ship]').forEach(btn=>btn.addEventListener('click',()=>{let b=state.bats.find(x=>x.id===btn.dataset.id);if(b){b.shipStatus=btn.dataset.ship;render();toast('Shipping updated')}}))}
function groupSum(items,keyFn,valFn){let m={};items.forEach(x=>{let k=keyFn(x)||'Unknown';m[k]=(m[k]||0)+valFn(x)});return Object.entries(m).sort((a,b)=>b[1]-a[1])}
function renderAnalytics(){let sold=state.bats.filter(b=>b.status==='sold'),stock=state.bats.filter(b=>b.status!=='sold'),brandProfit=groupSum(sold,b=>b.brand,b=>netBat(b)).slice(0,6),sourceSpend=groupSum(state.expenses,e=>e.source,e=>num(e.amount)).slice(0,6),stockByBrand=groupSum(stock,b=>b.brand,b=>1).slice(0,6);function rows(arr,type='money'){return arr.length?arr.map(([k,v])=>`<div class="row"><span>${esc(k)}</span><b>${type==='money'?money(v):v}</b></div>`).join(''):'<p class="brand">Not enough data yet.</p>'}$('analyticsList').innerHTML=`<div class="insight"><h3>Profit by Brand</h3>${rows(brandProfit)}</div><div class="insight"><h3>Inventory Count by Brand</h3>${rows(stockByBrand,'count')}</div><div class="insight"><h3>Spend by Source</h3>${rows(sourceSpend)}</div>`}
function setView(v){view=v;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===v));$('speedMenu').classList.remove('open')}function openModal(id,title){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'));$('scrim').classList.add('open');$(id).classList.add('open');$(id).querySelector('h2').textContent=title}function closeModal(){$('scrim').classList.remove('open');$('speedMenu').classList.remove('open');document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'))}
function previewPhotos(){let p=$('photoPreview');p.innerHTML=editingPhotos.map((src,i)=>`<div><img src="${src}" style="width:88px;height:88px;object-fit:cover;border-radius:16px;border:1px solid var(--line)"><button type="button" data-rmphoto="${i}" class="btn danger" style="padding:6px;margin-top:4px;width:88px">Remove</button></div>`).join('');document.querySelectorAll('[data-rmphoto]').forEach(b=>b.onclick=()=>{editingPhotos.splice(+b.dataset.rmphoto,1);previewPhotos()})}
function clearBat(){['id','brand','model','weight','cost','ask','sold','buyer','shippingCost','fees','source','tracking','addressNote','notes'].forEach(id=>$(id).value='');$('cert').value='ASA/USA';$('condition').value='New';$('status').value='instock';$('shipStatus').value='none';$('pinned').checked=false;editingPhotos=[];previewPhotos();$('deleteBat').style.display='none';$('copyPost').style.display='none';$('copyProof').style.display='none'}function openAddBat(status='instock'){clearBat();$('status').value=status;if(status==='sold')$('shipStatus').value='todo';openModal('batModal',status==='sold'?'Log sale':'Add bat')}function openEditBat(id){let b=state.bats.find(x=>x.id===id);if(!b)return;clearBat();Object.keys(b).forEach(k=>{if($(k)){if(k==='pinned')$('pinned').checked=!!b[k];else $(k).value=b[k]||''}});editingPhotos=[...(b.photos||[])];previewPhotos();$('deleteBat').style.display='';$('copyPost').style.display='';$('copyProof').style.display='';openModal('batModal','Edit bat')}function collectBat(){let old=state.bats.find(b=>b.id===$('id').value)||{};return {id:$('id').value||uid(),brand:$('brand').value.trim(),model:$('model').value.trim(),weight:$('weight').value.trim(),cert:$('cert').value,condition:$('condition').value,status:$('status').value,cost:$('cost').value,ask:$('ask').value,sold:$('sold').value,buyer:$('buyer').value.trim(),shippingCost:$('shippingCost').value,fees:$('fees').value,source:$('source').value.trim(),shipStatus:$('shipStatus').value,tracking:$('tracking').value.trim(),addressNote:$('addressNote').value.trim(),notes:$('notes').value.trim(),photos:editingPhotos,pinned:$('pinned').checked,createdAt:old.createdAt||Date.now()}}
function clearExpense(){['expenseId','expenseSource','expenseAmount','expenseNotes'].forEach(id=>$(id).value='');$('expenseCategory').value='Raffle Entry';$('expenseDate').value=today();$('deleteExpense').style.display='none'}function openAddExpense(){clearExpense();openModal('expenseModal','Log expense')}function openEditExpense(id){let e=state.expenses.find(x=>x.id===id);if(!e)return;clearExpense();$('expenseId').value=e.id;$('expenseSource').value=e.source||'';$('expenseAmount').value=e.amount||'';$('expenseCategory').value=e.category||'Raffle Entry';$('expenseDate').value=e.date||'';$('expenseNotes').value=e.notes||'';$('deleteExpense').style.display='';openModal('expenseModal','Edit expense')}function collectExpense(){let old=state.expenses.find(e=>e.id===$('expenseId').value)||{};return {id:$('expenseId').value||uid(),source:$('expenseSource').value.trim(),amount:$('expenseAmount').value,category:$('expenseCategory').value,date:$('expenseDate').value||today(),notes:$('expenseNotes').value.trim(),createdAt:old.createdAt||Date.now()}}
function clearRaffle(){['raffleId','raffleName','raffleSpots','rafflePrice','raffleFilled','raffleWinner','rafflePrize','raffleShipping','raffleNotes'].forEach(id=>$(id).value='');$('raffleStatus').value='open';$('deleteRaffle').style.display='none';$('copyRaffle').style.display='none'}function openAddRaffle(){clearRaffle();openModal('raffleModal','Add raffle')}function openEditRaffle(id){let r=state.raffles.find(x=>x.id===id);if(!r)return;clearRaffle();$('raffleId').value=r.id;$('raffleName').value=r.name||'';$('raffleStatus').value=r.status||'open';$('raffleSpots').value=r.spots||'';$('rafflePrice').value=r.price||'';$('raffleFilled').value=r.filled||'';$('raffleWinner').value=r.winner||'';$('rafflePrize').value=r.prize||'';$('raffleShipping').value=r.shipping||'';$('raffleNotes').value=r.notes||'';$('deleteRaffle').style.display='';$('copyRaffle').style.display='';openModal('raffleModal','Edit raffle')}function collectRaffle(){let old=state.raffles.find(r=>r.id===$('raffleId').value)||{};return {id:$('raffleId').value||uid(),name:$('raffleName').value.trim(),status:$('raffleStatus').value,spots:$('raffleSpots').value,price:$('rafflePrice').value,filled:$('raffleFilled').value,winner:$('raffleWinner').value.trim(),prize:$('rafflePrize').value.trim(),shipping:$('raffleShipping').value,notes:$('raffleNotes').value.trim(),createdAt:old.createdAt||Date.now()}}
function postText(){let b=collectBat(),line=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ');return `⛽ ${line}\n${b.cert||'ASA/USA'} • ${b.condition||''}\n${b.ask?'💰 '+money(b.ask):''}\n${b.notes?'📝 '+b.notes:''}\n— SPGS`}function proofText(){let b=collectBat(),line=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ');return `SPGS Proof — ${line}\nSource: ${b.source||'—'}\nCost: ${money(b.cost)}\nStatus: ${label(b.status)}\nBuyer: ${b.buyer||'—'}\nTracking: ${b.tracking||'—'}\nPhotos saved: ${editingPhotos.length}\nNotes: ${b.notes||'—'}`}function raffleText(){let r=collectRaffle();return `🎰 ${r.name}\n${r.filled||0}/${r.spots||0} spots filled @ ${money(r.price)}\n${r.prize?'🏆 Prize: '+r.prize+'\n':''}${r.winner?'👑 Winner: '+r.winner+'\n':''}${r.notes?'📝 '+r.notes+'\n':''}— SPGS`}
$('photos').addEventListener('change',async e=>{let files=[...e.target.files].slice(0,6);for(const f of files){if(!f.type.startsWith('image/'))continue;let src=await new Promise(res=>{let r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f)});editingPhotos.push(src)}e.target.value='';previewPhotos()});
$('batForm').addEventListener('submit',e=>{e.preventDefault();let b=collectBat();if(!b.brand){toast('Brand is required');return}let i=state.bats.findIndex(x=>x.id===b.id);if(i>-1)state.bats[i]=b;else state.bats.push(b);closeModal();render();toast('Bat saved')});$('expenseForm').addEventListener('submit',e=>{e.preventDefault();let x=collectExpense();if(!x.source||!num(x.amount)){toast('Source and amount required');return}let i=state.expenses.findIndex(e=>e.id===x.id);if(i>-1)state.expenses[i]=x;else state.expenses.push(x);closeModal();render();toast('Expense saved')});$('raffleForm').addEventListener('submit',e=>{e.preventDefault();let r=collectRaffle();if(!r.name){toast('Raffle name required');return}let i=state.raffles.findIndex(x=>x.id===r.id);if(i>-1)state.raffles[i]=r;else state.raffles.push(r);closeModal();render();toast('Raffle saved')});
$('deleteBat').onclick=()=>{state.bats=state.bats.filter(b=>b.id!==$('id').value);closeModal();render();toast('Deleted')};$('deleteExpense').onclick=()=>{state.expenses=state.expenses.filter(e=>e.id!==$('expenseId').value);closeModal();render();toast('Deleted')};$('deleteRaffle').onclick=()=>{state.raffles=state.raffles.filter(r=>r.id!==$('raffleId').value);closeModal();render();toast('Deleted')};
function copy(txt,msg){navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>toast(msg)):toast('Clipboard unavailable')}$('copyPost').onclick=()=>copy(postText(),'Listing copied');$('copyProof').onclick=()=>copy(proofText(),'Proof copied');$('copyRaffle').onclick=()=>copy(raffleText(),'Raffle update copied');$('drawWinner').onclick=()=>{let spots=num($('raffleSpots').value);if(!spots){toast('Add number of spots first');return}let n=Math.floor(Math.random()*spots)+1;$('raffleWinner').value=`Spot #${n}`;toast(`Winner: spot #${n}`)};$('togglePin').onclick=()=>{$('pinned').checked=!$('pinned').checked;toast($('pinned').checked?'Pinned':'Unpinned')};
$('quickBuy').onclick=()=>openAddBat();$('quickSold').onclick=()=>openAddBat('sold');$('quickRaffle').onclick=openAddRaffle;$('quickExpense').onclick=openAddExpense;$('quickShip').onclick=()=>{setView('shipping')};$('fab').onclick=()=>{$('speedMenu').classList.toggle('open')};document.querySelectorAll('[data-speed]').forEach(b=>b.onclick=()=>{let v=b.dataset.speed;if(v==='bat')openAddBat();if(v==='sold')openAddBat('sold');if(v==='raffle')openAddRaffle();if(v==='expense')openAddExpense();if(v==='shipment')setView('shipping')});$('scrim').onclick=closeModal;document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setView(t.dataset.view));$('search').oninput=render;$('sort').onchange=render;$('copyBackup').onclick=()=>copy($('backupBox').value,'Backup copied');$('restoreBackup').onclick=()=>{try{state=normalize(JSON.parse($('backupBox').value));render();toast('Restored')}catch(e){toast('Invalid backup text')}};document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});load();render();})();
</script>
</body>
