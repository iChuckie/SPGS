<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bat Tank — SPGS</title>
<meta name="theme-color" content="#08111f" />
<style>
:root{--bg:#07101d;--panel:#0d1a2b;--panel2:#122238;--text:#eef5ff;--muted:#90a4bf;--line:rgba(255,255,255,.12);--blue:#4e8cff;--green:#24d18b;--red:#ff5b6e;--yellow:#ffd166;--shadow:0 20px 60px rgba(0,0,0,.45)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#14284a 0,#07101d 48%,#050912 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding-bottom:100px}.wrap{max-width:720px;margin:auto;padding:18px}.hero{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.94),rgba(8,17,31,.94));border-radius:22px;box-shadow:var(--shadow)}.kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}.hero h1{margin:4px 0 0;font-size:30px;letter-spacing:-.04em}.badge{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,#4e8cff,#ff334f);display:grid;place-items:center;font-weight:1000;box-shadow:0 0 28px rgba(78,140,255,.36)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{border:1px solid var(--line);background:rgba(13,26,43,.78);border-radius:18px;padding:14px}.stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:11px;font-weight:800}.stat b{display:block;font-size:24px;margin-top:4px}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.btn{border:0;border-radius:16px;padding:14px 12px;font-weight:900;color:white;background:var(--panel2);font-size:15px;box-shadow:inset 0 0 0 1px var(--line);cursor:pointer}.btn:active{transform:scale(.97)}.btn.primary{background:linear-gradient(145deg,#4e8cff,#3466d9)}.btn.green{background:linear-gradient(145deg,#24d18b,#119c64)}.btn.yellow{background:linear-gradient(145deg,#ffd166,#d99112);color:#1c1300}.btn.red{background:linear-gradient(145deg,#ff5b6e,#c62b41)}.tools{position:sticky;top:0;z-index:5;margin:12px -18px 12px;padding:12px 18px;background:linear-gradient(180deg,rgba(7,16,29,.98),rgba(7,16,29,.78));backdrop-filter:blur(14px);display:flex;gap:8px}.tools input,.tools select{height:42px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:0 12px;font-size:15px}.tools input{flex:1}.tools select{width:128px}.list{display:grid;gap:10px}.empty{border:1px dashed var(--line);border-radius:22px;padding:28px 18px;text-align:center;color:var(--muted);background:rgba(13,26,43,.5)}.empty h2{color:var(--text);margin:0 0 8px}.card{width:100%;text-align:left;border:1px solid var(--line);background:linear-gradient(145deg,rgba(18,34,56,.96),rgba(10,20,35,.96));color:var(--text);border-radius:20px;padding:15px;box-shadow:0 10px 28px rgba(0,0,0,.25);cursor:pointer}.card:active{transform:scale(.992)}.cardTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-size:18px;font-weight:950;letter-spacing:-.02em}.brand{color:var(--muted);font-size:13px;font-weight:800;margin-top:2px}.price{font-size:20px;font-weight:1000;color:#fff}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.04)}.status{color:white;font-weight:900}.sold .status{background:rgba(255,91,110,.22);color:#ff9aa5}.listed .status{background:rgba(36,209,139,.18);color:#65efb6}.pending .status{background:rgba(255,209,102,.18);color:#ffe0a0}.profit{margin-top:10px;font-size:13px;color:var(--muted)}.profit b{color:var(--green)}.fab{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:10;border:0;border-radius:999px;background:linear-gradient(145deg,#4e8cff,#3466d9);color:white;padding:15px 24px;font-size:16px;font-weight:1000;box-shadow:0 12px 38px rgba(0,0,0,.55),0 0 28px rgba(78,140,255,.45);cursor:pointer}.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;display:none}.scrim.open{display:block}.modal{position:fixed;left:50%;bottom:0;transform:translate(-50%,110%);z-index:30;width:min(720px,100%);max-height:92vh;overflow:auto;background:#0b1727;border:1px solid var(--line);border-radius:24px 24px 0 0;box-shadow:var(--shadow);transition:transform .22s ease}.modal.open{transform:translate(-50%,0)}.modalHead{position:sticky;top:0;background:#0b1727;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:14px 18px}.modal h2{margin:0;font-size:19px}.close{background:transparent;color:var(--muted);border:0;font-size:30px;line-height:1;cursor:pointer}.form{padding:16px 18px 24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{margin-bottom:12px}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:12px;font-size:16px}.field textarea{min-height:78px;resize:vertical}.formActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.formActions .btn{flex:1 1 130px}.danger{background:transparent!important;color:var(--red)!important;border:1px solid rgba(255,91,110,.4)!important}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(12px);z-index:50;background:#13233a;border:1px solid var(--line);border-radius:14px;padding:11px 15px;color:var(--text);opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}details{margin-top:18px;border:1px solid var(--line);border-radius:18px;background:rgba(13,26,43,.65)}summary{padding:13px 15px;color:var(--muted);font-weight:900;text-transform:uppercase;font-size:12px;letter-spacing:.1em}.backupBody{padding:0 15px 15px}.backupBody textarea{width:100%;min-height:100px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px}@media(max-width:430px){.hero h1{font-size:26px}.grid{grid-template-columns:1fr}.stats,.actions{grid-template-columns:1fr 1fr}.btn{font-size:14px;padding:13px 9px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero"><div><div class="kicker">Slowpitch Gas Station</div><h1>Bat Tank</h1></div><div class="badge">SPGS</div></section>
  <section class="stats">
    <div class="stat"><small>In stock</small><b id="statStock">0</b></div>
    <div class="stat"><small>Asking total</small><b id="statAsk">$0</b></div>
    <div class="stat"><small>Sold</small><b id="statSold">0</b></div>
    <div class="stat"><small>Net profit</small><b id="statProfit">$0</b></div>
  </section>
  <section class="actions">
    <button class="btn primary" id="quickAdd">+ Add Bat</button>
    <button class="btn green" id="quickListed">Log Listed</button>
    <button class="btn red" id="quickSold">Log Sold</button>
    <button class="btn yellow" id="quickNeeds">Needs Price</button>
  </section>
  <div class="tools"><input id="search" placeholder="Search bats…"><select id="sort"><option value="recent">Recent</option><option value="brand">Brand</option><option value="price">Price</option><option value="weight">Weight</option></select></div>
  <main class="list" id="list"></main>
  <details><summary>Backup & Restore</summary><div class="backupBody"><textarea id="backupBox"></textarea><div class="actions"><button class="btn" id="copyBackup">Copy Backup</button><button class="btn" id="restoreBackup">Restore Paste</button></div></div></details>
</div>
<button class="fab" id="fab">+ Add bat</button>
<div class="scrim" id="scrim"></div>
<section class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="modalHead"><h2 id="modalTitle">Add bat</h2><button class="close" id="close" aria-label="Close">×</button></div>
  <form class="form" id="batForm">
    <input type="hidden" id="id">
    <div class="grid"><div class="field"><label>Brand *</label><input id="brand" required placeholder="Anarchy"></div><div class="field"><label>Model</label><input id="model" placeholder="America"></div></div>
    <div class="grid"><div class="field"><label>Weight</label><input id="weight" inputmode="decimal" placeholder="25"></div><div class="field"><label>Association</label><select id="cert"><option>ASA/USA</option><option>USSSA</option><option>Senior</option><option>NSA</option><option>ISA</option><option></option></select></div></div>
    <div class="grid"><div class="field"><label>Condition</label><select id="condition"><option>New</option><option>NIW</option><option>Mint</option><option>Used</option></select></div><div class="field"><label>Status</label><select id="status"><option value="instock">In Stock</option><option value="listed">Listed</option><option value="pending">Pending</option><option value="sold">Sold</option></select></div></div>
    <div class="grid"><div class="field"><label>Cost $</label><input id="cost" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Asking $</label><input id="ask" type="number" inputmode="decimal" step="0.01"></div></div>
    <div class="grid"><div class="field"><label>Sold For $</label><input id="sold" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Shipping $</label><input id="shipping" type="number" inputmode="decimal" step="0.01"></div></div>
    <div class="grid"><div class="field"><label>Fees $</label><input id="fees" type="number" inputmode="decimal" step="0.01"></div><div class="field"><label>Acquired</label><input id="acquired" type="date"></div></div>
    <div class="field"><label>Notes</label><textarea id="notes" placeholder="Source, buyer, raffle info, tracking, etc."></textarea></div>
    <div class="formActions"><button class="btn primary" type="submit">Save Bat</button><button class="btn" type="button" id="copyPost">Copy Post</button><button class="btn danger" type="button" id="deleteBat">Delete</button></div>
  </form>
</section>
<div class="toast" id="toast"></div>
<script>
(function(){
const KEY='spgs_bat_tank_fixed_v1';
const $=id=>document.getElementById(id);
let bats=[];
const money=n=>'$'+Math.round(Number(n)||0).toLocaleString('en-US');
const num=v=>Number(v)||0;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700)}
function load(){try{bats=JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){bats=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(bats));$('backupBox').value=JSON.stringify(bats,null,2)}
function stats(){let stock=0,ask=0,sold=0,profit=0;bats.forEach(b=>{if(b.status==='sold'){sold++;profit+=num(b.sold)-num(b.cost)-num(b.shipping)-num(b.fees)}else{stock++;ask+=num(b.ask)}});$('statStock').textContent=stock;$('statAsk').textContent=money(ask);$('statSold').textContent=sold;$('statProfit').textContent=money(profit)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(){stats();save();let q=$('search').value.toLowerCase().trim();let arr=bats.filter(b=>(b.brand+' '+b.model+' '+b.cert+' '+b.notes).toLowerCase().includes(q));let sort=$('sort').value;if(sort==='brand')arr.sort((a,b)=>(a.brand+a.model).localeCompare(b.brand+b.model));if(sort==='price')arr.sort((a,b)=>num(b.ask)-num(a.ask));if(sort==='weight')arr.sort((a,b)=>num(b.weight)-num(a.weight));if(sort==='recent')arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));const list=$('list');if(!arr.length){list.innerHTML='<div class="empty"><h2>Tank is empty</h2><p>Tap Add Bat to start tracking inventory, sales, shipping, and profit.</p></div>';return}list.innerHTML=arr.map(b=>{let net=num(b.sold)-num(b.cost)-num(b.shipping)-num(b.fees);return `<button class="card ${b.status}" data-id="${b.id}"><div class="cardTop"><div><div class="title">${esc(b.weight?b.weight+'oz ':'')}${esc(b.brand)} ${esc(b.model)}</div><div class="brand">${esc(b.cert||'ASA/USA')} • ${esc(b.condition||'')}</div></div><div class="price">${b.ask?money(b.ask):''}</div></div><div class="chips"><span class="chip status">${esc(label(b.status))}</span>${b.cost?`<span class="chip">Cost ${money(b.cost)}</span>`:''}${b.sold?`<span class="chip">Sold ${money(b.sold)}</span>`:''}</div>${b.status==='sold'?`<div class="profit">Net profit: <b>${money(net)}</b></div>`:''}</button>`}).join('');document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openEdit(c.dataset.id)))}
function label(s){return ({instock:'In Stock',listed:'Listed',pending:'Pending',sold:'Sold'})[s]||'In Stock'}
function clearForm(){['id','brand','model','weight','cost','ask','sold','shipping','fees','acquired','notes'].forEach(id=>$(id).value='');$('cert').value='ASA/USA';$('condition').value='New';$('status').value='instock';$('deleteBat').style.display='none';$('copyPost').style.display='none'}
function openModal(title){$('modalTitle').textContent=title;$('scrim').classList.add('open');$('modal').classList.add('open');setTimeout(()=>$('brand').focus(),120)}
function closeModal(){$('scrim').classList.remove('open');$('modal').classList.remove('open')}
function openAdd(status='instock'){clearForm();$('status').value=status;$('deleteBat').style.display='none';$('copyPost').style.display='none';openModal(status==='sold'?'Log sold bat':status==='listed'?'Log listed bat':'Add bat')}
function openEdit(id){let b=bats.find(x=>x.id===id);if(!b)return;clearForm();Object.keys(b).forEach(k=>{if($(k))$(k).value=b[k]||''});$('deleteBat').style.display='';$('copyPost').style.display='';openModal('Edit bat')}
function collect(){return {id:$('id').value||uid(),brand:$('brand').value.trim(),model:$('model').value.trim(),weight:$('weight').value.trim(),cert:$('cert').value,condition:$('condition').value,status:$('status').value,cost:$('cost').value,ask:$('ask').value,sold:$('sold').value,shipping:$('shipping').value,fees:$('fees').value,acquired:$('acquired').value,notes:$('notes').value.trim(),createdAt:$('id').value?(bats.find(b=>b.id===$('id').value)?.createdAt||Date.now()):Date.now()}}
$('batForm').addEventListener('submit',e=>{e.preventDefault();let b=collect();if(!b.brand){toast('Brand is required');return}let i=bats.findIndex(x=>x.id===b.id);if(i>-1)bats[i]=b;else bats.push(b);closeModal();render();toast('Saved')});
$('deleteBat').addEventListener('click',()=>{let id=$('id').value;if(!id)return;bats=bats.filter(b=>b.id!==id);closeModal();render();toast('Deleted')});
function postText(){let b=collect();let line=[b.weight?b.weight+'oz':'',b.brand,b.model].filter(Boolean).join(' ');return `⛽ ${line}\n${b.cert||'ASA/USA'} • ${b.condition||''}\n${b.ask?'💰 '+money(b.ask):''}\n${b.notes?'📝 '+b.notes:''}\n— SPGS`;}
$('copyPost').addEventListener('click',()=>navigator.clipboard?navigator.clipboard.writeText(postText()).then(()=>toast('Listing copied')):toast('Clipboard unavailable'));
$('quickAdd').addEventListener('click',()=>openAdd('instock'));$('fab').addEventListener('click',()=>openAdd('instock'));$('quickListed').addEventListener('click',()=>openAdd('listed'));$('quickSold').addEventListener('click',()=>openAdd('sold'));$('quickNeeds').addEventListener('click',()=>{let missing=bats.filter(b=>b.status!=='sold'&&!num(b.ask));if(missing[0])openEdit(missing[0].id);else toast('No bats missing price')});$('close').addEventListener('click',closeModal);$('scrim').addEventListener('click',closeModal);$('search').addEventListener('input',render);$('sort').addEventListener('change',render);$('copyBackup').addEventListener('click',()=>navigator.clipboard?navigator.clipboard.writeText($('backupBox').value).then(()=>toast('Backup copied')):toast('Clipboard unavailable'));$('restoreBackup').addEventListener('click',()=>{try{let data=JSON.parse($('backupBox').value);if(!Array.isArray(data))throw Error();bats=data;render();toast('Restored')}catch(e){toast('Invalid backup text')}});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
load();render();
})();
</script>
</body>
</html>
