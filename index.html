<style>
  :root{
    --carbon:#0B0F1A;
    --carbon-2:#0F1524;
    --panel:#141B2E;
    --panel-2:#1B243B;
    --line:#2A3654;
    --line-soft:#1E2840;
    --chrome:#DCE2EC;
    --chrome-dim:#8893A8;
    --steel:#AEB7C7;
    --ink:#F1F5FB;
    --red:#E23B3B;
    --red-deep:#B5202B;
    --blue:#5B8DEF;
    --blue-bright:#7FB0FF;
    --gold:#F2B33D;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--carbon);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(96px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
  }
  .wrap{max-width:680px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{
    padding:18px 18px 15px;
    position:relative;
    background:
      radial-gradient(120% 120% at 22% -10%, rgba(91,141,239,.16), transparent 55%),
      radial-gradient(120% 120% at 90% -20%, rgba(226,59,59,.12), transparent 55%),
      repeating-linear-gradient(45deg, #0d1424 0 2px, #0a0f1b 2px 4px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.018) 0 2px, transparent 2px 4px),
      linear-gradient(180deg,var(--carbon-2),var(--carbon));
    border-bottom:1px solid transparent;
    border-image:linear-gradient(90deg, var(--red) 0%, #2c3a57 45%, var(--blue) 100%) 1;
  }
  .brandbar{display:flex;align-items:center;gap:13px;}
  .badge{
    width:62px;height:62px;border-radius:50%;flex:0 0 auto;display:block;
    box-shadow:0 0 0 1px rgba(180,200,255,.14),0 6px 18px rgba(0,0,0,.55),0 0 26px rgba(91,141,239,.22);
  }
  .apptitle .kicker{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--chrome-dim);margin-bottom:3px;}
  .apptitle .appname{
    font-size:23px;font-weight:800;letter-spacing:.05em;line-height:1;
    background:linear-gradient(180deg,#F4F7FC 8%,#AFBCD2 55%,#7E8AA2 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.6));
  }

  .readout{margin-top:15px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .gauge{
    position:relative;text-align:center;padding:11px 8px 9px;border-radius:10px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 1px, transparent 1px 3px),
      linear-gradient(180deg,#0A1020,#060a13);
    border:1px solid var(--line);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 22px rgba(0,0,0,.6);
  }
  .gauge .val{font-family:var(--mono);font-size:25px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
  .gauge.tank .val{color:var(--chrome);text-shadow:0 0 10px rgba(220,226,236,.3);}
  .gauge.cash .val{color:var(--blue-bright);text-shadow:0 0 11px rgba(127,176,255,.5);font-size:21px;}
  .gauge.gas  .val{color:var(--red);text-shadow:0 0 11px rgba(226,59,59,.5);}
  .gauge .lab{margin-top:6px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--chrome-dim);}

  /* ---------- Controls ---------- */
  .controls{padding:14px 14px 4px;position:sticky;top:0;z-index:5;
    background:linear-gradient(180deg,var(--carbon) 72%,rgba(11,15,26,0));}
  .search{position:relative;}
  .search input{
    width:100%;font-size:15px;font-family:var(--sans);
    background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px 11px 38px;
  }
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55;}
  .search input::placeholder{color:var(--chrome-dim);}

  .chips{display:flex;gap:7px;overflow-x:auto;padding:11px 0 9px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;font-size:12px;letter-spacing:.04em;font-weight:600;white-space:nowrap;cursor:pointer;
    background:var(--panel);color:var(--steel);
    border:1px solid var(--line);border-radius:999px;padding:7px 13px;
  }
  .chip[aria-pressed="true"]{
    background:linear-gradient(180deg,#6C9BF5,#3E6FD6);color:#fff;border-color:#3E6FD6;
    box-shadow:0 0 14px rgba(91,141,239,.35);
  }
  .chip .ct{opacity:.6;margin-left:5px;font-variant-numeric:tabular-nums;}
  .chip[aria-pressed="true"] .ct{opacity:.85;}

  .sortrow{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:2px 0 4px;}
  .sortrow label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--chrome-dim);}
  .sortrow select{font-family:var(--sans);font-size:13px;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:6px 8px;}

  /* ---------- List ---------- */
  .list{padding:6px 14px 0;display:flex;flex-direction:column;gap:10px;}
  .card{
    position:relative;text-align:left;width:100%;cursor:pointer;color:inherit;font-family:inherit;
    background:linear-gradient(180deg,var(--panel),var(--carbon-2));
    border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:13px 14px;
    transition:transform .12s ease,border-color .12s ease;
  }
  .card:hover{border-color:#3a4a70;}
  .card:active{transform:scale(.992);}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .card .title{font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;}
  .card .title .brand{color:var(--steel);font-weight:600;}
  .card .price{font-family:var(--mono);font-size:15px;color:var(--chrome);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .card .spec{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12.5px;color:var(--steel);}
  .card .spec b{color:var(--ink);font-weight:600;}
  .card .spec .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .card .meta{margin-top:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pill{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid transparent;}
  .pill.dot::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:1px;background:currentColor;}
  .tag{font-size:11px;color:var(--chrome-dim);}
  .tag.flame{color:var(--red);}

  .s-instock{--c:var(--blue);}
  .s-listed{--c:var(--gold);}
  .s-pending{--c:#8FA6D6;}
  .s-sold{--c:var(--chrome-dim);}
  .card.s-sold{opacity:.6;}
  .card{border-left-color:var(--c,var(--line));}
  .pill{color:var(--c,var(--steel));border-color:color-mix(in srgb,var(--c,var(--steel)) 42%,transparent);background:color-mix(in srgb,var(--c,var(--steel)) 14%,transparent);}

  /* ---------- Empty ---------- */
  .empty{margin:38px 18px;text-align:center;color:var(--chrome-dim);}
  .empty .badge-faded{width:78px;height:78px;border-radius:50%;opacity:.4;margin:0 auto 16px;display:block;filter:grayscale(.2);}
  .empty h2{color:var(--steel);font-size:18px;margin:0 0 6px;font-weight:700;}
  .empty p{margin:0 0 18px;font-size:14px;line-height:1.5;}
  .empty button{background:linear-gradient(180deg,#6C9BF5,#3E6FD6);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 0 16px rgba(91,141,239,.3);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + env(safe-area-inset-bottom));z-index:20;
    display:flex;align-items:center;gap:9px;
    background:linear-gradient(180deg,#6C9BF5,#3E6FD6);color:#fff;border:none;border-radius:999px;
    padding:14px 22px;font-size:15px;font-weight:800;letter-spacing:.02em;cursor:pointer;font-family:inherit;
    box-shadow:0 8px 24px rgba(0,0,0,.55),0 0 0 1px rgba(127,176,255,.45) inset,0 0 22px rgba(91,141,239,.4);
  }
  .fab:active{transform:translateX(-50%) scale(.96);}

  /* ---------- Sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(4,6,12,.66);z-index:30;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:680px;margin:0 auto;
    background:var(--carbon-2);border-top:1px solid var(--line);border-radius:18px 18px 0 0;
    transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);
    max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -12px 40px rgba(0,0,0,.55);
  }
  .sheet.open{transform:translateY(0);}
  .sheet .grip{width:40px;height:4px;border-radius:2px;background:var(--line);margin:9px auto 2px;}
  .sheet .shead{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;border-bottom:1px solid var(--line-soft);}
  .sheet .shead h3{margin:0;font-size:16px;font-weight:700;letter-spacing:.02em;}
  .sheet .shead .x{background:none;border:none;color:var(--chrome-dim);font-size:24px;line-height:1;cursor:pointer;padding:2px 6px;}
  .sform{overflow-y:auto;padding:14px 18px 18px;-webkit-overflow-scrolling:touch;}

  .field{margin-bottom:13px;}
  .field.row{display:flex;gap:10px;}
  .field.row>div{flex:1;}
  label.lab{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--chrome-dim);margin-bottom:6px;}
  .req{color:var(--blue-bright);}
  input,select,textarea{
    width:100%;font-family:var(--sans);font-size:15px;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:10px 11px;
  }
  input[type="number"]{font-family:var(--mono);}
  textarea{resize:vertical;min-height:58px;line-height:1.4;}
  input:focus,select:focus,textarea:focus,.chip:focus-visible,button:focus-visible,.card:focus-visible{
    outline:2px solid var(--blue-bright);outline-offset:1px;
  }

  .sactions{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .btn{flex:1 1 120px;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn.save{background:linear-gradient(180deg,#6C9BF5,#3E6FD6);color:#fff;box-shadow:0 0 16px rgba(91,141,239,.3);}
  .btn.dup{flex:0 0 auto;background:var(--panel);color:var(--steel);border:1px solid var(--line);}
  .btn.del{flex:0 0 auto;background:none;color:var(--red);border:1px solid color-mix(in srgb,var(--red) 48%,transparent);}
  .btn.del.confirm{background:var(--red);color:#fff;}

  .err{color:var(--red);font-size:12.5px;margin-top:-6px;margin-bottom:10px;display:none;}
  .err.show{display:block;}
  .hidden{display:none;}

  /* ---------- Backup ---------- */
  .backup{padding:0 14px;}
  .backup details{background:var(--carbon-2);border:1px solid var(--line-soft);border-radius:10px;margin-top:14px;}
  .backup summary{cursor:pointer;padding:11px 14px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-dim);}
  .backup .body{padding:0 14px 14px;}
  .backup p{font-size:12.5px;color:var(--chrome-dim);line-height:1.5;margin:4px 0 10px;}
  .backup textarea{font-family:var(--mono);font-size:11px;min-height:90px;}
  .backup .bbtns{display:flex;gap:8px;margin-top:10px;}
  .backup .bbtns button{flex:1;background:var(--panel);color:var(--steel);border:1px solid var(--line);border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

  .toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:13px;z-index:50;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="grip"></div>
  <div class="shead">
    <h3 id="sheetTitle">Add bat</h3>
    <button class="x" id="closeBtn" aria-label="Close">×</button>
  </div>
  <div class="sform">
    <div class="field row">
      <div>
        <label class="lab" for="f_brand">Brand <span class="req">*</span></label>
        <select id="f_brand">
          <option value="">Select brand…</option>
          <option>Miken</option><option>Worth</option><option>Easton</option>
          <option>Anarchy</option><option>Monsta</option><option>Suncoast</option>
          <option>Victus</option><option>Marucci</option><option>Dudley</option>
          <option>DeMarini</option><option>Short Porch</option><option>Proton</option>
          <option>Adidas</option><option>Smash It Sports</option>
          <option value="__other__">Other…</option>
        </select>
        <input id="f_brand_other" class="hidden" autocomplete="off" placeholder="Brand name" style="margin-top:8px;" />
      </div>
      <div>
        <label class="lab" for="f_model">Model</label>
        <input id="f_model" autocomplete="off" placeholder="Hype Fire" />
      </div>
    </div>

    <div class="field">
      <label class="lab" for="f_weight">Weight (oz)</label>
      <select id="f_weight">
        <option value="">Select weight…</option>
        <option>24</option><option>25</option><option>26</option><option>27</option>
        <option value="__other__">Other…</option>
      </select>
      <input id="f_weight_other" class="hidden" type="number" inputmode="decimal" step="0.5" min="20" max="34" placeholder="oz" style="margin-top:8px;" />
    </div>

    <div class="field row">
      <div><label class="lab" for="f_cert">Cert</label>
        <select id="f_cert"><option value="">—</option>
          <option>USSSA</option><option>ASA/USA</option><option>Senior</option>
          <option>NSA</option><option>ISA</option><option>Multi</option><option>Other</option></select></div>
      <div><label class="lab" for="f_load">Load</label>
        <select id="f_load"><option value="">—</option>
          <option>Balanced</option><option>Mid-load</option><option>End-load</option><option>Max-load</option></select></div>
    </div>

    <div class="field row">
      <div><label class="lab" for="f_condition">Condition</label>
        <select id="f_condition">
          <option>New</option><option>Like new</option><option>Open box</option><option>Used</option></select></div>
      <div><label class="lab" for="f_status">Status</label>
        <select id="f_status">
          <option value="instock">In Stock</option><option value="listed">Listed</option>
          <option value="pending">Pending</option><option value="sold">Sold</option></select></div>
    </div>

    <div class="field row">
      <div><label class="lab" for="f_ask">Asking ($)</label>
        <input id="f_ask" type="number" inputmode="decimal" step="1" min="0" placeholder="0" /></div>
      <div><label class="lab" for="f_cost">Cost ($)</label>
        <input id="f_cost" type="number" inputmode="decimal" step="1" min="0" placeholder="optional" /></div>
    </div>

    <div class="field"><label class="lab" for="f_acquired">Acquired</label>
      <input id="f_acquired" type="date" /></div>

    <div class="field"><label class="lab" for="f_notes">Notes</label>
      <textarea id="f_notes" placeholder="Where it came from, how it hits, serial #…"></textarea></div>

    <div class="err" id="formErr">Add a brand at least.</div>

    <div class="sactions">
      <button class="btn del" id="delBtn" type="button" style="display:none;">Delete</button>
      <button class="btn dup" id="dupBtn" type="button" style="display:none;">Duplicate</button>
      <button class="btn save" id="saveBtn" type="button">Save bat</button>
    </div>
  </div>
</div>

  var STATUS={
    instock:{label:"In Stock",cls:"s-instock"},
    listed:{label:"Listed",cls:"s-listed"},
    pending:{label:"Pending",cls:"s-pending"},
    sold:{label:"Sold",cls:"s-sold"}
  };
  var FILTERS=[
    {k:"all",label:"All"},{k:"instock",label:"In Stock"},{k:"listed",label:"Listed"},
    {k:"pending",label:"Pending"},{k:"sold",label:"Sold"}
  ];

  var $=function(id){return document.getElementById(id);};

  var hasArtifactStore = !!(window.storage && window.storage.get);
  function lsAvailable(){ try{ localStorage.setItem("__bt_t","1"); localStorage.removeItem("__bt_t"); return true; }catch(e){ return false; } }

  async function load(){
    var raw=null;
    if(hasArtifactStore){
      try{ var res=await window.storage.get(KEY,false); raw=(res&&res.value)?res.value:null; }catch(e){ raw=null; }
    } else if(lsAvailable()){
      try{ raw=localStorage.getItem(KEY); }catch(e){ raw=null; }
    } else { memoryOnly=true; }
    if(raw){ try{ bats=JSON.parse(raw)||[]; }catch(e){ bats=[]; } }
    // migrate older saved data to the sales model
    var oldStatus={gamer:1,shelf:1,forsale:1,loaner:1,retired:1};
    bats.forEach(function(b){
      if(b.ask==null && b.price!=null){ b.ask=b.price; }
      if(oldStatus[b.status]){ b.status="instock"; }
      if(!b.status){ b.status="instock"; }
    });
  }
  async function save(){
    var v=JSON.stringify(bats);
    if(hasArtifactStore){ try{ await window.storage.set(KEY,v,false); return; }catch(e){} }
    try{ localStorage.setItem(KEY,v); }catch(e){ memoryOnly=true; }
  }

  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function money(n){ if(n==null||n==="")return ""; var v=Math.round(Number(n)); return "$"+v.toLocaleString("en-US"); }
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}

  function readouts(){
    var stock=0,asking=0,sold=0;
    bats.forEach(function(b){
      if(b.status==="sold"){ sold++; }
      else { stock++; asking+=Number(b.ask)||0; }
    });
    $("rStock").textContent=stock;
    $("rAsking").textContent=money(asking)||"$0";
    $("rSold").textContent=sold;
  }

  function matchesFilter(b){ return filter==="all"||b.status===filter; }
  function matchesSearch(b,q){
    if(!q)return true;
    var hay=(b.brand+" "+b.model+" "+(b.notes||"")+" "+(b.cert||"")).toLowerCase();
    return hay.indexOf(q)>-1;
  }
  function sortBats(arr){
    var s=$("sort").value, c=arr.slice();
    if(s==="brand") c.sort(function(a,b){return (a.brand+a.model).localeCompare(b.brand+b.model);});
    else if(s==="weightHi") c.sort(function(a,b){return (b.weight||0)-(a.weight||0);});
    else if(s==="weightLo") c.sort(function(a,b){return (a.weight||999)-(b.weight||999);});
    else if(s==="priceHi") c.sort(function(a,b){return (b.price||0)-(a.price||0);});
    else c.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
    return c;
  }

  function renderChips(){
    var box=$("chips"); box.innerHTML="";
    FILTERS.forEach(function(f){
      var ct=f.k==="all"?bats.length:bats.filter(function(b){return b.status===f.k;}).length;
      if(f.k!=="all"&&ct===0) return;
      var b=document.createElement("button");
      b.className="chip"; b.type="button";
      b.setAttribute("aria-pressed",filter===f.k?"true":"false");
      b.innerHTML=esc(f.label)+'<span class="ct">'+ct+'</span>';
      b.onclick=function(){ filter=f.k; render(); };
      box.appendChild(b);
    });
  }

  function render(){
    readouts(); renderChips();
    var q=$("search").value.trim().toLowerCase();
    var shown=sortBats(bats.filter(function(b){return matchesFilter(b)&&matchesSearch(b,q);}));
    var list=$("list"); list.innerHTML="";

    if(bats.length===0){
      list.innerHTML='<div class="empty">'+
        '<img class="badge-faded" src="'+LOGO+'" alt="" />'+
        '<h2>Tank\u2019s empty</h2>'+
        '<p>Add your first bat to start tracking your for-sale inventory \u2014 condition, asking price, and what\u2019s sold.</p>'+
        '<button id="emptyAdd" type="button">Add a bat</button></div>';
      $("emptyAdd").onclick=openAdd;
      $("backupBox").value=JSON.stringify(bats,null,2);
      return;
    }
    if(shown.length===0){
      list.innerHTML='<div class="empty"><h2>No matches</h2><p>Nothing fits that search or filter. Try clearing it.</p></div>';
    }

    shown.forEach(function(b){
      var st=STATUS[b.status]||STATUS.instock;
      var card=document.createElement("button");
      card.className="card "+st.cls; card.type="button";
      card.setAttribute("aria-label","Edit "+b.brand+" "+b.model);

      var specs=[];
      if(b.weight) specs.push('<span class="mono"><b>'+esc(b.weight)+'</b> oz</span>');
      if(b.cert) specs.push(esc(b.cert));
      if(b.condition) specs.push(esc(b.condition));

      var tags=[];
      if(b.load){ tags.push('<span class="tag'+(/end|max/i.test(b.load)?' flame':'')+'">'+esc(b.load)+'</span>'); }

      card.innerHTML=
        '<div class="top">'+
          '<div class="title">'+esc(b.model||"")+(b.model?' ':'')+'<span class="brand">'+esc(b.brand)+'</span></div>'+
          (b.ask?'<div class="price">'+money(b.ask)+'</div>':'')+
        '</div>'+
        (specs.length?'<div class="spec">'+specs.join('')+'</div>':'')+
        '<div class="meta"><span class="pill dot">'+esc(st.label)+'</span>'+tags.join('')+'</div>';
      card.onclick=function(){ openEdit(b.id); };
      list.appendChild(card);
    });

    $("backupBox").value=JSON.stringify(bats,null,2);
  }

  function openSheet(){ $("scrim").classList.add("open"); $("sheet").classList.add("open"); document.body.style.overflow="hidden"; }
  function closeSheet(){ $("scrim").classList.remove("open"); $("sheet").classList.remove("open"); document.body.style.overflow=""; resetDelConfirm(); }

  function setBrand(brand){
    var sel=$("f_brand"), other=$("f_brand_other");
    brand=brand||"";
    sel.value=brand;
    if(sel.value!==brand){ sel.value="__other__"; other.value=brand; other.classList.remove("hidden"); }
    else{ other.value=""; other.classList.add("hidden"); }
  }
  function setWeight(w){
    var sel=$("f_weight"), other=$("f_weight_other");
    w=(w==null?"":String(w));
    sel.value=w;
    if(sel.value!==w){ sel.value="__other__"; other.value=w; other.classList.remove("hidden"); }
    else{ other.value=""; other.classList.add("hidden"); }
  }
  function fillForm(b){
    setBrand(b.brand); setWeight(b.weight); $("f_model").value=b.model||"";
    $("f_cert").value=b.cert||""; $("f_load").value=b.load||"";
    $("f_status").value=b.status||"instock"; $("f_condition").value=b.condition||"";
    $("f_ask").value=b.ask||""; $("f_cost").value=b.cost||""; $("f_acquired").value=b.acquired||"";
    $("f_notes").value=b.notes||"";
    $("formErr").classList.remove("show");
  }
  function openAdd(){
    editingId=null; $("sheetTitle").textContent="Add bat"; $("delBtn").style.display="none"; $("dupBtn").style.display="none";
    fillForm({status:"instock",condition:"New"}); openSheet();
    setTimeout(function(){ $("f_brand").focus(); },260);
  }
  function openEdit(id){
    var b=bats.find(function(x){return x.id===id;}); if(!b)return;
    editingId=id; $("sheetTitle").textContent="Edit bat"; $("delBtn").style.display=""; $("dupBtn").style.display="";
    fillForm(b); openSheet();
  }
  function duplicateCurrent(){
    if(!editingId)return;
    var b=bats.find(function(x){return x.id===editingId;}); if(!b)return;
    editingId=null;
    $("sheetTitle").textContent="Add bat";
    $("delBtn").style.display="none"; $("dupBtn").style.display="none";
    fillForm(b); resetDelConfirm();
    toast("Copy \u2014 change the weight, then save");
    setTimeout(function(){ var w=$("f_weight"); w.focus(); if(w.select) w.select(); },80);
  }
  function collectForm(){
    var sel=$("f_brand");
    var brand = sel.value==="__other__" ? $("f_brand_other").value.trim() : sel.value;
    return {
      brand:brand, model:$("f_model").value.trim(),
      weight:($("f_weight").value==="__other__"?$("f_weight_other").value.trim():$("f_weight").value),
      cert:$("f_cert").value, load:$("f_load").value, status:$("f_status").value,
      condition:$("f_condition").value, ask:$("f_ask").value.trim(), cost:$("f_cost").value.trim(),
      acquired:$("f_acquired").value, notes:$("f_notes").value.trim()
    };
  }
  async function saveForm(){
    var data=collectForm();
    if(!data.brand){ $("formErr").classList.add("show"); ($("f_brand").value==="__other__"?$("f_brand_other"):$("f_brand")).focus(); return; }
    if(editingId){ var b=bats.find(function(x){return x.id===editingId;}); if(b) Object.assign(b,data); toast("Saved"); }
    else{ data.id=uid(); data.createdAt=Date.now(); bats.push(data); toast("Added to the tank"); }
    await save(); closeSheet(); render();
  }

  var delArmed=false;
  function resetDelConfirm(){ delArmed=false; var d=$("delBtn"); d.classList.remove("confirm"); d.textContent="Delete"; }
  async function onDelete(){
    if(!editingId)return;
    if(!delArmed){ delArmed=true; var d=$("delBtn"); d.classList.add("confirm"); d.textContent="Tap again to delete"; return; }
    bats=bats.filter(function(x){return x.id!==editingId;});
    await save(); closeSheet(); render(); toast("Deleted");
  }

  var toastTimer;
  function toast(msg){
    var t=$("toast"); t.textContent=msg+(memoryOnly?" (not saved — storage off)":""); t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove("show");},1900);
  }

  function copyBackup(){
    var ta=$("backupBox"); ta.removeAttribute("readonly"); ta.select(); ta.setSelectionRange(0,99999);
    var ok=false; try{ ok=document.execCommand("copy"); }catch(e){}
    ta.setAttribute("readonly","readonly");
    if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).catch(function(){}); ok=true; }
    toast(ok?"Backup copied":"Select the text and copy");
  }
  async function restore(){
    var ta=$("backupBox"); ta.removeAttribute("readonly"); var raw=ta.value.trim();
    try{
      var parsed=JSON.parse(raw); if(!Array.isArray(parsed)) throw 0;
      parsed.forEach(function(b){ if(!b.id)b.id=uid(); if(!b.createdAt)b.createdAt=Date.now(); if(!b.status)b.status="instock"; });
      bats=parsed; await save(); render(); toast("Restored "+bats.length+" bats");
    }catch(e){ toast("That doesn\u2019t look like valid backup text"); }
    ta.setAttribute("readonly","readonly");
  }

  $("addBtn").onclick=openAdd;
  $("f_brand").onchange=function(){
    var other=$("f_brand_other");
    if(this.value==="__other__"){ other.classList.remove("hidden"); other.focus(); }
    else{ other.classList.add("hidden"); }
  };
  $("f_weight").onchange=function(){
    var other=$("f_weight_other");
    if(this.value==="__other__"){ other.classList.remove("hidden"); other.focus(); }
    else{ other.classList.add("hidden"); }
  };
  $("closeBtn").onclick=closeSheet;
  $("scrim").onclick=closeSheet;
  $("saveBtn").onclick=saveForm;
  $("delBtn").onclick=onDelete;
  $("dupBtn").onclick=duplicateCurrent;
  $("search").oninput=render;
  $("sort").onchange=render;
  $("copyBtn").onclick=copyBackup;
  $("restoreBtn").onclick=restore;
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeSheet(); });

  (async function init(){
    try{
      var iconHref=document.querySelector('link[rel="apple-touch-icon"]').href;
      var mf={name:"Bat Tank \u2014 Slowpitch Gas Station",short_name:"Bat Tank",display:"standalone",
        background_color:"#0B0F1A",theme_color:"#0B0F1A",start_url:".",
        icons:[{src:iconHref,sizes:"180x180",type:"image/png",purpose:"any"}]};
      var bl=new Blob([JSON.stringify(mf)],{type:"application/manifest+json"});
      var lk=document.createElement("link"); lk.rel="manifest"; lk.href=URL.createObjectURL(bl); document.head.appendChild(lk);
    }catch(e){}
    await load(); render();
    if(memoryOnly) toast("Storage off \u2014 data won\u2019t persist here");
  })();
})();
</script>
